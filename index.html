  document.getElementById('pageActions').innerHTML=exportBtns;
  document.getElementById('pageBody').innerHTML=projectFilterBar()+`<div class="stats-row">${stats.map(s=>`<div class="stat-card" onclick="showDashDetail('${s.key}')"><div class="stat-label"><i class="ti ${s.icon}" style="${s.color?'color:'+s.color:''}"></i>${s.label}</div><div class="stat-value" style="${s.color?'color:'+s.color:''}">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`).join('')}</div>`+projCards+emptyHtml+recentHtml;
}

window.showDashDetail=function(type){
  const role=currentUser.role;
  const myA=role==='team'?DB.audits.filter(a=>a.teamMemberId==currentUser.id):DB.audits;
  const myS=role==='team'?DB.stores.filter(s=>s.assignedTo==currentUser.id):DB.stores;
  const fA=selectedProject==='all'?myA:myA.filter(a=>a.projectId==selectedProject);
  const fS=selectedProject==='all'?myS:myS.filter(s=>s.projectId==selectedProject);
  const tbl=(head,rows)=>`<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
  let title='',html='';
  if(type==='total-stores'||type==='assigned-stores'||type==='unassigned-stores'||type==='my-stores'){const list=type==='assigned-stores'?fS.filter(s=>s.assignedTo):type==='unassigned-stores'?fS.filter(s=>!s.assignedTo):fS;title=type.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())+' ('+list.length+')';html=tbl('<th>Store</th><th>Team</th><th>Project</th><th>Rate</th><th>Audit</th>',list.map(s=>{const m=userBy(s.assignedTo),p=DB.projects.find(x=>x.id==s.projectId),a=auditForStore(s.id);return`<tr><td><strong>${s.name}</strong><br><small>${s.city}</small></td><td style="font-size:12px">${m?.name||'—'}</td><td style="font-size:12px">${p?.name||'—'}</td><td>${moneyFmt(s.paymentRate)}</td><td>${a?badge(a.status):'—'}</td></tr>`;}).join(''));}
  else if(['total-audits','pending-review','approved','payment-pending','total-paid'].includes(type)){const list=type==='pending-review'?fA.filter(a=>a.status==='submitted'):type==='approved'?fA.filter(a=>a.status==='approved'):type==='payment-pending'?fA.filter(a=>a.paymentStatus!=='paid'):type==='total-paid'?fA.filter(a=>a.paymentStatus==='paid'):fA;title=type.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())+' ('+list.length+')';const canReview=role==='admin'||role==='manager';html=tbl('<th>Store</th><th>Team</th><th>Status</th><th>Payment</th><th>Amount</th>'+(canReview&&type==='pending-review'?'<th></th>':''),list.map(a=>{const s=storeBy(a.storeId),m=userBy(a.teamMemberId);return`<tr><td><strong>${s?.name||'—'}</strong></td><td style="font-size:12px">${m?.name||'—'}</td><td>${badge(a.status)}</td><td>${badge(a.paymentStatus)}</td><td>${moneyFmt(a.paymentAmount)}</td>${canReview&&type==='pending-review'?`<td><button class="btn btn-sm btn-primary-sm" onclick="closeModal();setTimeout(()=>reviewAudit('${a.id}'),100)">Review</button></td>`:''}</tr>`;}).join(''));}
  if(html)openModal(title,html);
  else toast('No data','info');
};

  document.getElementById('pageBody').innerHTML=`<div class="card"><div class="card-header"><div class="card-title">Projects (${projects.length})</div></div><div class="table-wrap"><table><thead><tr><th>Project</th><th>Manager</th><th>Dates</th><th>Progress</th><th>Budget</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function showCreateProject(){openModal('New Project',`<div class="form-row"><div class="form-field"><label>Name *</label><input id="pName" placeholder="Q1 VM Audit"></div><div class="form-field"><label>Code *</label><input id="pCode" placeholder="VM-Q1-2025"></div></div><div class="form-row"><div class="form-field"><label>Start Date</label><input type="date" id="pStart"></div><div class="form-field"><label>End Date</label><input type="date" id="pEnd"></div></div><div class="form-row"><div class="form-field"><label>Budget (₹)</label><input type="number" id="pBudget" placeholder="50000"></div><div class="form-field"><label>Status</label><select id="pStatus"><option value="active">Active</option><option value="planning">Planning</option><option value="completed">Completed</option></select></div></div><div style="display:flex;justify-content:flex-end;margin-top:14px"><button class="btn btn-primary-sm" onclick="createProject()"><i class="ti ti-check"></i> Create</button></div>`);}
window.createProject=async function(){const name=document.getElementById('pName').value.trim(),code=document.getElementById('pCode').value.trim();if(!name||!code){toast('Fill required fields','error');return;}showLoader('Creating…');try{const id=await fsAdd('projects',{name,code,status:document.getElementById('pStatus').value||'active',startDate:document.getElementById('pStart').value||'',endDate:document.getElementById('pEnd').value||'',progress:0,budget:parseInt(document.getElementById('pBudget').value)||0,spent:0,managerId:null});DB.projects.push({id,name,code,status:document.getElementById('pStatus').value||'active',startDate:document.getElementById('pStart').value||'',endDate:document.getElementById('pEnd').value||'',progress:0,budget:parseInt(document.getElementById('pBudget').value)||0,spent:0,managerId:null});toast('Project created!');closeModal();renderProjects();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};
window.editProject=function(projId){const p=DB.projects.find(x=>x.id==projId);if(!p)return;const managers=DB.users.filter(u=>u.role==='manager');openModal('Edit — '+p.name,`<div class="form-row"><div class="form-field"><label>Name *</label><input id="epName" value="${p.name}"></div><div class="form-field"><label>Code *</label><input id="epCode" value="${p.code}"></div></div><div class="form-row"><div class="form-field"><label>Start</label><input type="date" id="epStart" value="${p.startDate||''}"></div><div class="form-field"><label>End</label><input type="date" id="epEnd" value="${p.endDate||''}"></div></div><div class="form-row"><div class="form-field"><label>Budget</label><input type="number" id="epBudget" value="${p.budget||0}"></div><div class="form-field"><label>Status</label><select id="epStatus"><option value="active" ${p.status==='active'?'selected':''}>Active</option><option value="planning" ${p.status==='planning'?'selected':''}>Planning</option><option value="completed" ${p.status==='completed'?'selected':''}>Completed</option></select></div></div><div class="form-field"><label>Assign Manager</label><select id="epMgr"><option value="">— None —</option>${managers.map(m=>`<option value="${m.id}" ${p.managerId==m.id?'selected':''}>${m.name}</option>`).join('')}</select></div><div style="display:flex;justify-content:space-between;margin-top:14px"><button class="btn btn-danger" onclick="deleteProject('${projId}')"><i class="ti ti-trash"></i> Delete</button><button class="btn btn-primary-sm" onclick="updateProject('${projId}')"><i class="ti ti-check"></i> Update</button></div>`);};
window.updateProject=async function(projId){const p=DB.projects.find(x=>x.id==projId);if(!p)return;const name=document.getElementById('epName').value.trim(),code=document.getElementById('epCode').value.trim();if(!name||!code){toast('Fill required fields','error');return;}showLoader('Updating…');const data={name,code,startDate:document.getElementById('epStart').value||'',endDate:document.getElementById('epEnd').value||'',budget:parseInt(document.getElementById('epBudget').value)||0,status:document.getElementById('epStatus').value,managerId:document.getElementById('epMgr').value||null};try{await fsUpdate('projects',projId,data);Object.assign(p,data);toast('Updated!');closeModal();renderProjects();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};
window.deleteProject=function(projId){const p=DB.projects.find(x=>x.id==projId);if(!p)return;openModal('Delete Project',`<div style="text-align:center;padding:16px 0"><i class="ti ti-alert-triangle" style="font-size:44px;color:var(--amber);display:block;margin-bottom:12px"></i><p style="font-weight:700;margin-bottom:18px">Delete "${p.name}"?</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmDeleteProject('${projId}')"><i class="ti ti-trash"></i> Delete</button></div></div>`);};
window.confirmDeleteProject=async function(projId){const idx=DB.projects.findIndex(x=>x.id==projId);if(idx===-1)return;showLoader('Deleting…');try{await fsDelete('projects',projId);DB.projects.splice(idx,1);const la=DB.audits.filter(a=>a.projectId==projId);for(const a of la)await fsDelete('audits',a.id);DB.audits=DB.audits.filter(a=>a.projectId!=projId);toast('Deleted');closeModal();renderProjects();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};

/* ━━━━━━━━━━━ STORES ━━━━━━━━━━━ */
function renderStores(){
  if(currentUser.role==='team'){renderStoresTeam();return;}
  let stores=DB.stores;
  if(currentUser.role==='manager'){const pids=getAccessibleProjects().map(p=>p.id);stores=stores.filter(s=>pids.includes(s.projectId));}
  if(selectedProject!=='all')stores=stores.filter(s=>s.projectId==selectedProject);
  document.getElementById('pageActions').innerHTML=`<button class="btn btn-primary-sm" onclick="showAddStore()"><i class="ti ti-plus"></i> Add Store</button><button class="btn" onclick="showImportExcel()"><i class="ti ti-table-import"></i> Import</button><button class="btn" onclick="exportMasterSheet()"><i class="ti ti-table-export"></i> Export</button>`;
  let rows='';
  stores.forEach(s=>{const a=auditForStore(s.id),m=userBy(s.assignedTo),p=DB.projects.find(x=>x.id==s.projectId);const freelancerCell=m?`<div style="min-width:0"><span style="font-size:13px;font-weight:600">${m.name}</span><br><span style="font-family:monospace;font-size:10.5px;background:rgba(96,165,250,0.18);color:#93c5fd;padding:1px 6px;border-radius:10px;font-weight:700">${m.phone||m.email||'—'}</span></div>`:'<span style="color:var(--text3);font-size:12px">Unassigned</span>';const canUploadAudit=!a||a.status==='rejected';rows+=`<tr data-store-id="${s.id}"><td style="width:36px;text-align:center;"><input type="checkbox" class="store-chk" value="${s.id}" onchange="updateBulkBar()" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)"></td><td><div style="display:flex;align-items:center;gap:8px;"><span style="font-family:monospace;font-size:11px;font-weight:700;color:#fff;background:var(--accent);padding:2px 7px;border-radius:20px;flex-shrink:0;">${s.storeNo||'—'}</span><div style="min-width:0;"><strong>${s.name}</strong><br><span style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;display:block">${[s.code,s.address].filter(Boolean).join(' · ')}</span></div></div></td><td><span style="font-size:12px;font-weight:600;color:var(--accent)">${p?p.code+' — '+p.name:'—'}</span></td><td>${freelancerCell}</td><td>${s.city||'—'}</td><td>${moneyFmt(s.paymentRate)}</td><td>${s.selfAssign?'<span class="badge badge-blue">Yes</span>':'<span style="color:var(--text3);font-size:12px">No</span>'}</td><td>${a?badge(a.status):'<span style="color:var(--text3)">—</span>'}</td><td style="white-space:nowrap;display:flex;gap:6px;align-items:center;"><button class="btn btn-sm" onclick="editStore('${s.id}')"><i class="ti ti-pencil"></i></button>${canUploadAudit?`<button class="btn btn-sm btn-primary-sm" onclick="adminStartAudit('${s.id}')" title="Upload audit on behalf of freelancer"><i class="ti ti-upload"></i> Upload</button>`:''}</td></tr>`;});
  document.getElementById('pageBody').innerHTML=projectFilterBar()+`<div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;"><div class="search-wrap" style="max-width:300px;flex:1"><i class="ti ti-search"></i><input id="storeSearch" placeholder="Search stores…" oninput="filterStoresTable()"></div></div><div id="bulkBar" style="display:none;background:var(--accent-bg);border:1.5px solid var(--accent);border-radius:var(--radius);padding:10px 16px;margin-bottom:12px;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;"><span id="bulkCount" style="font-size:13.5px;font-weight:600;color:var(--accent)">0 selected</span><div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn btn-sm" onclick="clearSelection()"><i class="ti ti-x"></i> Clear</button><button class="btn btn-sm" style="background:var(--accent);color:#fff;" onclick="bulkAssignProject()"><i class="ti ti-folder"></i> Assign Project</button><button class="btn btn-sm" style="background:var(--green);color:#fff;" onclick="bulkChangeRate()"><i class="ti ti-currency-rupee"></i> Change Rate</button><button class="btn btn-sm" style="background:var(--amber);color:#fff;" onclick="bulkAssignFreelancer()"><i class="ti ti-user"></i> Assign Freelancer</button><button class="btn btn-sm btn-danger" onclick="bulkDeleteStores()"><i class="ti ti-trash"></i> Delete</button></div></div><div class="card"><div class="card-header"><div class="card-title">All Stores (${stores.length})</div><label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" style="width:16px;height:16px;accent-color:var(--accent)"> Select All</label></div><div class="table-wrap"><table id="storesTable"><thead><tr><th style="width:36px"></th><th>Store</th><th>Project</th><th>Freelancer</th><th>City</th><th>Rate</th><th>Self-Assign</th><th>Audit</th><th></th></tr></thead><tbody id="storesTbody">${rows}</tbody></table></div></div>`;
}
window.toggleSelectAll=function(chk){document.querySelectorAll('.store-chk').forEach(c=>{if(c.closest('tr').style.display!=='none')c.checked=chk.checked;});updateBulkBar();};
window.updateBulkBar=function(){const selected=document.querySelectorAll('.store-chk:checked');const bar=document.getElementById('bulkBar');const count=document.getElementById('bulkCount');if(selected.length>0){bar.style.display='flex';count.textContent=selected.length+' store'+(selected.length>1?'s':'')+' selected';}else{bar.style.display='none';}};
window.clearSelection=function(){document.querySelectorAll('.store-chk').forEach(c=>c.checked=false);const sa=document.getElementById('selectAll');if(sa)sa.checked=false;updateBulkBar();};
window.bulkDeleteStores=async function(){const selected=[...document.querySelectorAll('.store-chk:checked')].map(c=>c.value);if(!selected.length){toast('No stores selected','warning');return;}openModal('Delete '+selected.length+' Stores',`<div style="text-align:center;padding:16px 0"><i class="ti ti-alert-triangle" style="font-size:44px;color:var(--amber);display:block;margin-bottom:12px"></i><p style="font-weight:700;margin-bottom:18px">Delete ${selected.length} stores?</p><p style="color:var(--red-text);font-size:13px;margin-bottom:18px">All linked audits will be removed.</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmBulkDelete(['${selected.join("','")}'])"><i class="ti ti-trash"></i> Delete All</button></div></div>`);};
window.confirmBulkDelete=async function(ids){showLoader('Deleting…');try{for(const id of ids){const idx=DB.stores.findIndex(s=>s.id==id);if(idx===-1)continue;await fsDelete('stores',id);DB.stores.splice(idx,1);const linked=DB.audits.filter(a=>a.storeId==id);for(const a of linked)await fsDelete('audits',a.id);DB.audits=DB.audits.filter(a=>a.storeId!=id);}toast(ids.length+' stores deleted');closeModal();renderStores();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};

window.bulkAssignProject=function(){const ids=[...document.querySelectorAll('.store-chk:checked')].map(c=>c.value);if(!ids.length){toast('No stores selected','warning');return;}const projects=DB.projects;openModal('Assign Project — '+ids.length+' Stores',`<p style="font-size:13px;color:var(--text2);margin-bottom:14px">Select a project to assign to all <strong>${ids.length}</strong> selected stores.</p><div class="form-field"><label>Project</label><select id="bkProjSel"><option value="">— None (remove project) —</option>${projects.map(p=>`<option value="${p.id}">${p.code} — ${p.name}</option>`).join('')}</select></div><div style="display:flex;justify-content:flex-end;margin-top:16px"><button class="btn btn-primary-sm" onclick="confirmBulkProject(['${ids.join("','")}'])"><i class="ti ti-check"></i> Apply to ${ids.length} Stores</button></div>`);};
window.confirmBulkProject=async function(ids){const projectId=document.getElementById('bkProjSel').value||null;showLoader('Updating…');try{for(const id of ids){await fsUpdate('stores',id,{projectId});const s=DB.stores.find(x=>x.id==id);if(s)s.projectId=projectId;}toast(ids.length+' stores updated!');closeModal();renderStores();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};

window.bulkChangeRate=function(){const ids=[...document.querySelectorAll('.store-chk:checked')].map(c=>c.value);if(!ids.length){toast('No stores selected','warning');return;}openModal('Change Rate — '+ids.length+' Stores',`<p style="font-size:13px;color:var(--text2);margin-bottom:14px">Set new audit payment rate for all <strong>${ids.length}</strong> selected stores.</p><div class="form-field"><label>New Rate (₹)</label><input type="number" id="bkRateVal" placeholder="2500" style="font-size:18px;font-weight:700;"></div><div style="display:flex;justify-content:flex-end;margin-top:16px"><button class="btn btn-primary-sm" onclick="confirmBulkRate(['${ids.join("','")}'])"><i class="ti ti-check"></i> Apply to ${ids.length} Stores</button></div>`);};
window.confirmBulkRate=async function(ids){const rate=parseInt(document.getElementById('bkRateVal').value);if(!rate||rate<0){toast('Enter valid rate','error');return;}showLoader('Updating…');try{for(const id of ids){await fsUpdate('stores',id,{paymentRate:rate});const s=DB.stores.find(x=>x.id==id);if(s)s.paymentRate=rate;}toast(ids.length+' stores updated to ₹'+rate.toLocaleString('en-IN'));closeModal();renderStores();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};

window.bulkAssignFreelancer=function(){const ids=[...document.querySelectorAll('.store-chk:checked')].map(c=>c.value);if(!ids.length){toast('No stores selected','warning');return;}const members=DB.users.filter(u=>u.role==='team'||u.role==='manager');openModal('Assign Freelancer — '+ids.length+' Stores',`<p style="font-size:13px;color:var(--text2);margin-bottom:14px">Assign a freelancer to all <strong>${ids.length}</strong> selected stores.</p><div class="form-field"><label>Freelancer</label><select id="bkFreelancerSel"><option value="">— Unassign —</option>${members.map(m=>`<option value="${m.id}">${m.name} (${m.role})</option>`).join('')}</select></div><div style="display:flex;justify-content:flex-end;margin-top:16px"><button class="btn btn-primary-sm" onclick="confirmBulkFreelancer(['${ids.join("','")}'])"><i class="ti ti-check"></i> Apply to ${ids.length} Stores</button></div>`);};
window.confirmBulkFreelancer=async function(ids){const assignedTo=document.getElementById('bkFreelancerSel').value||null;showLoader('Updating…');try{for(const id of ids){await fsUpdate('stores',id,{assignedTo,selfAssign:false});const s=DB.stores.find(x=>x.id==id);if(s){s.assignedTo=assignedTo;s.selfAssign=false;}}toast(ids.length+' stores assigned!');closeModal();renderStores();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};
window.filterStoresTable=function(){const q=(document.getElementById('storeSearch')?.value||'').toLowerCase();document.querySelectorAll('#storesTbody tr').forEach(r=>r.style.display=r.textContent.toLowerCase().includes(q)?'':'none');updateBulkBar();};

function renderStoresTeam(){
  const myS=DB.stores.filter(s=>s.assignedTo==currentUser.id);
  const selfS=DB.stores.filter(s=>s.selfAssign&&!s.assignedTo);
  const tabs=`<div class="tabs"><button class="tab-btn ${storeTab==='assigned'?'active':''}" onclick="switchStoreTab('assigned')">My Stores (${myS.length})</button><button class="tab-btn ${storeTab==='self'?'active':''}" onclick="switchStoreTab('self')"><i class="ti ti-map-pin" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>Nearby Self-Assign</button></div>`;
  let content='';
  if(storeTab==='assigned'){
    if(!myS.length){content=`<div class="empty"><i class="ti ti-building-store"></i><h3>No stores assigned</h3></div>`;}
    else{let cards='';myS.filter(s=>!auditForStore(s.id)).forEach(s=>{const a=auditForStore(s.id),p=DB.projects.find(x=>x.id==s.projectId);const canAudit=s.status!=='completed'&&!a;const addrLine=[s.address,s.city].filter(Boolean).join(', ')||'—';const statusEl=a?badge(a.status):'<span style="font-size:11.5px;color:var(--text3)">Not started</span>';cards+=`<div onclick="${canAudit?`startAudit('${s.id}')`:''}" style="background:var(--surface);border:1.5px solid ${canAudit?'var(--accent)':'var(--border)'};border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;${canAudit?'cursor:pointer;':''}display:flex;align-items:center;gap:12px;"><div style="flex:1;min-width:0;"><div style="font-size:14.5px;font-weight:700;margin-bottom:3px;">${s.name}</div><div style="font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${addrLine}</div><div style="display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap;">${p?`<span style="font-size:11.5px;font-weight:600;color:var(--accent)">${p.name}</span>`:''}<span style="font-size:11.5px;color:var(--text2)">₹${(s.paymentRate||0).toLocaleString('en-IN')}</span>${statusEl}</div></div><div style="flex-shrink:0;">${canAudit?`<div style="width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;"><i class="ti ti-chevron-right" style="font-size:20px;color:#fff;"></i></div>`:`<div style="width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;"><i class="ti ti-check" style="font-size:18px;color:var(--green);"></i></div>`}</div></div>`;});content=`<div style="padding:4px 0">${cards}</div>`;}
  }else{
    const dotClr=_gpsStatus==='ok'?'#22c55e':_gpsStatus==='loading'?'#f59e0b':_gpsStatus==='error'?'#ef4444':'#94a3b8';
    const locMsg=_gpsStatus==='ok'?`📍 ${_uLat.toFixed(5)}, ${_uLng.toFixed(5)} — ${_nearbyRadius} km radius`:_gpsStatus==='loading'?'⏳ Detecting GPS…':_gpsStatus==='error'?'❌ Location denied':'Tap "Detect Location" to see nearby stores';
    const gpsBar=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;"><button class="btn btn-primary-sm" onclick="gpsDetect()" ${_gpsStatus==='loading'?'disabled':''}><i class="ti ti-current-location"></i> ${_gpsStatus==='loading'?'Detecting…':'Detect Location'}</button>${_gpsStatus==='ok'?`<button class="btn btn-sm" onclick="_uLat=null;_uLng=null;_gpsStatus='idle';renderStoresTeam()"><i class="ti ti-x"></i> Clear</button>`:''}</div><div style="display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:var(--radius);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);font-size:13px;color:var(--text2);margin-bottom:14px;"><span style="width:8px;height:8px;border-radius:50%;background:${dotClr};flex-shrink:0;display:inline-block;"></span>${locMsg}</div>`;
    if(_gpsStatus==='idle'||_gpsStatus==='error'){content=gpsBar+`<div class="empty"><i class="ti ti-current-location" style="color:var(--accent)"></i><h3>Location required</h3><p>Tap Detect Location above.</p></div>`;document.getElementById('pageBody').innerHTML=tabs+content;return;}
    if(_gpsStatus==='loading'){content=gpsBar+`<div class="empty"><i class="ti ti-loader-2" style="color:var(--accent);animation:spin 1s linear infinite;"></i><h3>Getting location…</h3></div>`;document.getElementById('pageBody').innerHTML=tabs+content;return;}
    if(!selfS.length){content=gpsBar+`<div class="empty"><i class="ti ti-building-store"></i><h3>No self-assign stores</h3></div>`;}
    else{
      const withDist=selfS.map(s=>{let dist=null,cityApprox=false;let sLat=parseFloat(s.lat)||null,sLng=parseFloat(s.lng)||null;if((!sLat||!sLng)&&s.city){const cached=_geoCache[s.city.toLowerCase().trim()];if(cached){sLat=cached.lat;sLng=cached.lng;cityApprox=true;}}if(sLat&&sLng)dist=_haversine(_uLat,_uLng,sLat,sLng);return{...s,dist,cityApprox};});
      let nearby=withDist.filter(s=>s.dist!==null&&s.dist<=_nearbyRadius);if(_nearbyCity)nearby=nearby.filter(s=>s.city===_nearbyCity);if(_nearbyQ)nearby=nearby.filter(s=>(s.name||'').toLowerCase().includes(_nearbyQ.toLowerCase())||(s.city||'').toLowerCase().includes(_nearbyQ.toLowerCase()));nearby.sort((a,b)=>a.dist-b.dist);
      let cards='';
      if(!nearby.length){cards=`<div class="empty"><i class="ti ti-map-search"></i><h3>No stores nearby</h3><p>Try increasing radius.</p></div>`;}
      else{nearby.forEach(s=>{const req=DB.selfAssignRequests.find(r=>r.storeId==s.id&&r.teamMemberId==currentUser.id&&r.status==='pending');const p=DB.projects.find(x=>x.id==s.projectId);cards+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;"><div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:600;margin-bottom:3px;">${s.name}</div><div style="font-size:12px;color:var(--text2);margin-bottom:8px;">${s.city||'—'}${p?` · <span style="color:var(--accent)">${p.name}</span>`:''}</div>${req?`<span class="badge badge-amber"><i class="ti ti-clock" style="font-size:11px"></i> Requested</span>`:`<button class="btn btn-sm btn-primary-sm" onclick="reqSelfAssign('${s.id}')"><i class="ti ti-hand-click"></i> Claim</button>`}</div><span class="badge badge-green" style="flex-shrink:0;">${Math.round(s.dist)} km</span></div>`;});}
      content=gpsBar+cards;
    }
  }
  document.getElementById('pageBody').innerHTML=tabs+content;
}
window.switchStoreTab=function(t){storeTab=t;renderStoresTeam();};

function showAddStore(){
  const projects=getAccessibleProjects(),members=DB.users.filter(u=>u.role==='team'||u.role==='manager');
  const nextNo=genStoreNo();

window.autoGeocode=async function(){const city=document.getElementById('sCity')?.value.trim()||document.getElementById('esCity')?.value.trim();if(!city){toast('Enter city first','warning');return;}const status=document.getElementById('geoStatus');if(status)status.textContent='Searching…';try{const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city+' India')}&format=json&limit=1`);const data=await res.json();if(data.length){const lat=parseFloat(data[0].lat).toFixed(6),lng=parseFloat(data[0].lon).toFixed(6);const latEl=document.getElementById('sLat')||document.getElementById('esLat');const lngEl=document.getElementById('sLng')||document.getElementById('esLng');if(latEl)latEl.value=lat;if(lngEl)lngEl.value=lng;if(status)status.textContent=`✅ ${lat}, ${lng}`;}else{if(status)status.textContent='⚠️ Not found';}}catch(e){if(status)status.textContent='⚠️ Auto-detect failed';}};
window.useMyLocation=function(){const status=document.getElementById('geoStatus');if(status)status.textContent='Getting location…';if(!navigator.geolocation){if(status)status.textContent='GPS not available';return;}navigator.geolocation.getCurrentPosition(pos=>{const lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6);const latEl=document.getElementById('sLat')||document.getElementById('esLat');const lngEl=document.getElementById('sLng')||document.getElementById('esLng');if(latEl)latEl.value=lat;if(lngEl)lngEl.value=lng;if(status)status.textContent=`✅ ${lat}, ${lng}`;},()=>{if(status)status.textContent='⚠️ GPS denied';});};
window.onSelfChange=function(sel,teamId){const t=document.getElementById(teamId);if(!t)return;if(sel.value==='1'){t.value='';t.disabled=true;t.style.opacity='.4';}else{t.disabled=false;t.style.opacity='1';}};
function genStoreNo(){const existing=DB.stores.map(s=>s.storeNo).filter(Boolean);let max=0;existing.forEach(n=>{const m=n.match(/SEC-?(\d+)/i);if(m)max=Math.max(max,parseInt(m[1]));});const next=max+1;return'SEC'+(next<10?'0'+next:String(next));}
window.createStore=async function(){const name=document.getElementById('sName').value.trim(),city=document.getElementById('sCity').value.trim();if(!name||!city){toast('Fill required fields','error');return;}const selfAssign=document.getElementById('sSelf').value==='1';showLoader('Adding…');const storeNo=genStoreNo();const data={storeNo,name,code:document.getElementById('sCode').value||'',city,address:document.getElementById('sAddr').value||'',assignedTo:selfAssign?null:(document.getElementById('sTeam').value||null),status:'pending',projectId:document.getElementById('sProject').value||null,paymentRate:parseInt(document.getElementById('sRate').value)||2500,selfAssign,lat:parseFloat(document.getElementById('sLat').value)||null,lng:parseFloat(document.getElementById('sLng').value)||null};try{const id=await fsAdd('stores',data);DB.stores.push({id,...data});toast('Store added! ID: '+storeNo);closeModal();renderStores();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};
window.editStore=function(storeId){const s=storeBy(storeId);if(!s)return;const projects=getAccessibleProjects(),members=DB.users.filter(u=>u.role==='team'||u.role==='manager');openModal(`Edit — ${s.storeNo?'<span style="font-family:monospace;font-size:12px;background:var(--accent);color:#fff;padding:1px 8px;border-radius:20px;margin-right:6px;">'+s.storeNo+'</span>':''}${s.name}`,`<div class="form-row"><div class="form-field"><label>Store Name</label><input id="esName" value="${s.name}"></div><div class="form-field"><label>Code</label><input id="esCode" value="${s.code||''}"></div></div><div class="form-row"><div class="form-field"><label>City</label><input id="esCity" value="${s.city||''}"></div><div class="form-field"><label>Address</label><input id="esAddr" value="${s.address||''}"></div></div><div style="background:var(--surface2);border-radius:var(--radius);padding:12px;margin-bottom:12px;"><div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:8px;"><i class="ti ti-map-pin"></i> Store Location</div><div class="form-row"><div class="form-field" style="margin-bottom:0"><label>Latitude</label><input type="number" step="any" id="esLat" placeholder="17.3850" value="${s.lat||''}"></div><div class="form-field" style="margin-bottom:0"><label>Longitude</label><input type="number" step="any" id="esLng" placeholder="78.4867" value="${s.lng||''}"></div></div><div style="display:flex;gap:8px;margin-top:8px;"><button type="button" class="btn btn-sm" onclick="autoGeocode()" style="flex:1"><i class="ti ti-world-search"></i> Auto-detect</button><button type="button" class="btn btn-sm" onclick="useMyLocation()" style="flex:1"><i class="ti ti-current-location"></i> My Location</button></div><p id="geoStatus" style="font-size:11.5px;color:var(--text2);margin-top:6px;min-height:16px;">${s.lat?'✅ '+s.lat+', '+s.lng:''}</p></div><div class="form-row"><div class="form-field"><label>Assign to Team</label><select id="esTeam" ${s.selfAssign?'disabled style="opacity:.4"':''}><option value="">— Unassigned —</option>${members.map(m=>`<option value="${m.id}" ${s.assignedTo==m.id?'selected':''}>${m.name} (${m.role})</option>`).join('')}</select></div><div class="form-field"><label>Project</label><select id="esProject"><option value="">— None —</option>${projects.map(p=>`<option value="${p.id}" ${s.projectId==p.id?'selected':''}>${p.code} — ${p.name}</option>`).join('')}</select></div></div><div class="form-row"><div class="form-field"><label>Payment Rate (₹)</label><input type="number" id="esRate" value="${s.paymentRate||2500}"></div><div class="form-field"><label>Self-Assign</label><select id="esSelf" onchange="onSelfChange(this,'esTeam')"><option value="0" ${!s.selfAssign?'selected':''}>No</option><option value="1" ${s.selfAssign?'selected':''}>Yes</option></select></div></div><div style="display:flex;justify-content:space-between;margin-top:14px"><button class="btn btn-danger" onclick="deleteStore('${storeId}')"><i class="ti ti-trash"></i> Delete</button><button class="btn btn-primary-sm" onclick="updateStore('${storeId}')"><i class="ti ti-check"></i> Update</button></div>`);};
window.updateStore=async function(id){const s=storeBy(id);if(!s)return;showLoader('Updating…');const selfAssign=document.getElementById('esSelf').value==='1';const data={name:document.getElementById('esName').value,code:document.getElementById('esCode').value||'',city:document.getElementById('esCity').value||'',address:document.getElementById('esAddr').value||'',selfAssign,assignedTo:selfAssign?null:(document.getElementById('esTeam').value||null),projectId:document.getElementById('esProject').value||null,paymentRate:parseInt(document.getElementById('esRate').value)||s.paymentRate,lat:parseFloat(document.getElementById('esLat').value)||null,lng:parseFloat(document.getElementById('esLng').value)||null};try{await fsUpdate('stores',id,data);Object.assign(s,data);toast('Store updated!');closeModal();renderStores();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};
window.deleteStore=function(storeId){const s=storeBy(storeId);if(!s)return;openModal('Delete Store',`<div style="text-align:center;padding:16px 0"><i class="ti ti-alert-triangle" style="font-size:44px;color:var(--amber);display:block;margin-bottom:12px"></i><p style="font-weight:700;margin-bottom:18px">Delete "${s.name}"?</p><p style="color:var(--text2);font-size:13px;margin-bottom:18px">All linked audits will also be removed.</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmDeleteStore('${storeId}')"><i class="ti ti-trash"></i> Delete</button></div></div>`);};
window.confirmDeleteStore=async function(storeId){const idx=DB.stores.findIndex(s=>s.id==storeId);if(idx===-1)return;const name=DB.stores[idx].name;showLoader('Deleting…');try{await fsDelete('stores',storeId);DB.stores.splice(idx,1);const la=DB.audits.filter(a=>a.storeId==storeId);for(const a of la)await fsDelete('audits',a.id);DB.audits=DB.audits.filter(a=>a.storeId!=storeId);toast('"'+name+'" deleted');closeModal();renderStores();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};
window.reqSelfAssign=async function(storeId){if(DB.selfAssignRequests.some(r=>r.storeId==storeId&&r.teamMemberId==currentUser.id&&r.status==='pending')){toast('Already requested','warning');return;}showLoader('Sending…');try{const id=await fsAdd('selfAssignRequests',{storeId,teamMemberId:currentUser.id,status:'pending'});DB.selfAssignRequests.push({id,storeId,teamMemberId:currentUser.id,status:'pending'});toast('Request sent!');renderStoresTeam();}catch(e){toast('Error: '+e.message,'error');}hideLoader();};

/* ━━━━━━━━━━━ IMPORT EXCEL ━━━━━━━━━━━ */
function showImportExcel(){
  const projects=getAccessibleProjects(),members=DB.users.filter(u=>u.role==='team'||u.role==='manager');
  openModal('Import Stores from Excel',`<p style="font-size:13px;color:var(--text2);margin-bottom:12px">Columns: Name, Code, City, Address, PaymentRate</p><div class="form-field"><label>Excel File</label><input type="file" id="excelFile" accept=".xlsx,.xls"></div><div id="excelPreview" style="display:none"><div class="form-row"><div class="form-field"><label>Default Project</label><select id="bulkProject"><option value="">— None —</option>${projects.map(p=>`<option value="${p.id}">${p.code} — ${p.name}</option>`).join('')}</select></div><div class="form-field"><label>Default Rate (₹)</label><input type="number" id="bulkRate" value="2500" oninput="applyBulkRate(this.value)"></div></div><div style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px"><table style="width:100%;font-size:12.5px"><thead><tr style="background:var(--surface2);position:sticky;top:0"><th style="padding:8px 10px;font-size:11px;font-weight:700;text-align:left">STORE</th><th style="padding:8px 10px;font-size:11px;font-weight:700;text-align:left">CITY</th><th style="padding:8px 10px;font-size:11px;font-weight:700;text-align:left">RATE</th><th style="padding:8px 10px;font-size:11px;font-weight:700;text-align:left">ASSIGN</th></tr></thead><tbody id="importTbody"></tbody></table></div><div style="display:flex;justify-content:space-between;align-items:center"><span id="importCount" style="font-size:13px;color:var(--text2)"></span><button class="btn btn-primary-sm" id="importBtn"><i class="ti ti-upload"></i> Import All</button></div></div>`);
  let excelData=[];
  document.getElementById('excelFile').addEventListener('change',function(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1});if(rows.length<2){toast('Empty file','error');return;}const headers=rows[0].map(h=>h.toString().toLowerCase().trim());excelData=rows.slice(1).filter(r=>r.length>0).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]||'');return o;});let tbody='';excelData.forEach((row,i)=>{const name=row['name']||row['store name']||'Unnamed',city=row['city']||'',rate=row['paymentrate']||row['payment rate']||'2500';tbody+=`<tr style="border-bottom:1px solid var(--border)"><td style="padding:7px 10px"><strong>${name}</strong><br><span style="font-size:10px;color:var(--text2)">${row['code']||''}</span></td><td style="padding:7px 10px;font-size:12px">${city}</td><td style="padding:7px 10px"><input type="number" id="rowRate_${i}" value="${rate}" style="width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px"></td><td style="padding:7px 10px"><select id="rowTeam_${i}" style="padding:4px 7px;border:1px solid var(--border);border-radius:6px;font-size:12px;min-width:120px"><option value="">— Unassigned —</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></td></tr>`;});document.getElementById('importTbody').innerHTML=tbody;document.getElementById('importCount').textContent=excelData.length+' stores ready';document.getElementById('excelPreview').style.display='block';};reader.readAsArrayBuffer(file);});
  window.applyBulkRate=function(v){let i=0;while(true){const el=document.getElementById('rowRate_'+i);if(!el)break;el.value=v;i++;}};
  document.getElementById('importBtn').addEventListener('click',async()=>{if(!excelData.length){toast('No data','error');return;}const projectId=document.getElementById('bulkProject').value||null;const storesArr=[];excelData.forEach((row,i)=>{const assignedTo=document.getElementById('rowTeam_'+i)?.value||null;const rate=parseInt(document.getElementById('rowRate_'+i)?.value)||2500;storesArr.push({name:row['name']||row['store name']||'Unnamed',code:row['code']||'',city:row['city']||'',address:row['address']||'',assignedTo,status:'pending',projectId,paymentRate:rate,selfAssign:false});});showLoader('Importing…');try{for(const data of storesArr){data.storeNo=genStoreNo();const id=await fsAdd('stores',data);DB.stores.push({id,...data});}toast(storesArr.length+' stores imported!');closeModal();renderStores();}catch(e){toast('Error: '+e.message,'error');}hideLoader();});
}

window.submitAudit=async function(storeId,isAdminUpload){

  // Admin upload: verify a freelancer is selected
  let submittingUserId=currentUser.id;
  if(isAdminUpload){
    const sel=document.getElementById('adminAuditFreelancer');
    if(!sel||!sel.value){toast('Select a freelancer to submit for','error');return;}
    submittingUserId=sel.value;
  }
  const {frontData,selfieData}=window._auditPhotos();
  auditBusy=true;showLoader('Uploading photos…');
  const s=storeBy(storeId),auditId=Date.now().toString(),basePath=`audits/${auditId}`;
  const[frontUrl,selfieUrl]=await Promise.all([frontData?uploadPhoto(frontData,`${basePath}/front_photo.jpg`):Promise.resolve(null),selfieData?uploadPhoto(selfieData,`${basePath}/selfie_photo.jpg`):Promise.resolve(null)]);
  showLoader('Saving audit…');
  const data={storeId,projectId:s.projectId||null,teamMemberId:submittingUserId,status:'submitted',submittedAt:new Date().toISOString().split('T')[0],paymentAmount:s.paymentRate||0,paymentStatus:'pending',storeStatus,auditType,frontPhotoUrl:frontUrl||null,selfiePhotoUrl:selfieUrl||null,adminComments:null,uploadedBy:isAdminUpload?currentUser.id:null,uploadedByName:isAdminUpload?currentUser.name:null};
  try{const id=await fsAdd('audits',data);DB.audits.push({id,...data});await fsUpdate('stores',storeId,{status:'in-progress'});s.status='in-progress';auditBusy=false;toast(isAdminUpload?'Audit uploaded on behalf of freelancer! ✅':'Audit submitted! ✅');closeModal();renderStores();}

  hideLoader();
};

window.ePreviewPhoto=function(input,prevId){

window.saveAuditEdit=async function(auditId, newStatus, saveOnly=false){
  const a=DB.audits.find(x=>x.id==auditId),s=storeBy(a?.storeId);if(!a||!s)return;
  showLoader('Saving…');
  try{
    // Upload new photos if selected
    let frontUrl=a.frontPhotoUrl, selfieUrl=a.selfiePhotoUrl;
    const frontFile=document.getElementById('eFrontFile')?.files[0];
    const selfieFile=document.getElementById('eSelfieFile')?.files[0];
    if(frontFile){const url=await uploadPhoto(frontFile,`audits/${auditId}/front_admin_${Date.now()}`);if(url)frontUrl=url;}
    if(selfieFile){const url=await uploadPhoto(selfieFile,`audits/${auditId}/selfie_admin_${Date.now()}`);if(url)selfieUrl=url;}

    const status=saveOnly?a.status:newStatus;
    const data={
      storeStatus:   document.getElementById('eStoreStatus').value,
      auditType:     document.getElementById('eAuditType').value,
      paymentAmount: parseInt(document.getElementById('ePayAmt').value)||a.paymentAmount,
      paymentStatus: saveOnly?a.paymentStatus:(newStatus==='approved'?'processing':'rejected'),
      adminComments: document.getElementById('eComments').value||null,
      status,
      frontPhotoUrl:  frontUrl,
      selfiePhotoUrl: selfieUrl,
      editedAt: new Date().toISOString().split('T')[0],
      editedBy: currentUser.name
    };
    const storeStatus=saveOnly?s.status:(newStatus==='approved'?'completed':'rejected');
    await fsUpdate('audits',auditId,data);
    await fsUpdate('stores',a.storeId,{status:storeStatus});
    Object.assign(a,data); s.status=storeStatus;
    toast(saveOnly?'Audit saved':'Audit '+status,'success');
    closeModal();renderAudits();
  }catch(e){toast('Error: '+e.message,'error');}
  hideLoader();
};

window.openUPIForAudits=async function(auditIds){
  const audits=DB.audits.filter(a=>auditIds.includes(a.id));

};

window.openUPIForFreelancer=async function(userId, mode){

/* ━━━━━━━━━━━ CONFIRM DIALOG ━━━━━━━━━━━ */
function showConfirm(title, message, actionLabel='Confirm'){
  return new Promise(resolve=>{
    const id='confirmOverlay_'+Date.now();
    const color=actionLabel==='Approve'?'var(--green)':'var(--danger)';
    const icon=actionLabel==='Approve'?'ti-circle-check':'ti-circle-x';
    const div=document.createElement('div');
    div.id=id;
    div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
    div.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="width:38px;height:38px;border-radius:50%;background:${color}22;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="ti ${icon}" style="font-size:20px;color:${color};"></i>
        </div>
        <div style="font-size:15px;font-weight:700;color:var(--text1);">${title}</div>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px;white-space:pre-line;">${message}</div>
      <div style="display:flex;gap:10px;">
        <button onclick="document.getElementById('${id}').remove();resolve(false);" style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Cancel</button>
        <button onclick="document.getElementById('${id}').remove();resolve(true);" style="flex:1;padding:10px;border-radius:10px;border:none;background:${color};color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">${actionLabel}</button>
      </div>
    </div>`;
    // Fix: resolve must be accessible inside onclick — use dataset
    div.querySelector('button:first-child').onclick=()=>{div.remove();resolve(false);};
    div.querySelector('button:last-child').onclick=()=>{div.remove();resolve(true);};
    document.body.appendChild(div);
  });
}

window.submitReview=async function(auditId, status){
  const a=DB.audits.find(x=>x.id==auditId),s=storeBy(a?.storeId);if(!a||!s)return;
  if(currentUser.role!=='admin'){toast('Only admin can approve or reject audits','error');return;}
  const remarks=(document.getElementById('rComments').value||'').trim();
  if(!remarks){
    document.getElementById('rComments').style.borderColor='var(--danger)';
    document.getElementById('rComments').focus();
    toast('Remarks are required before '+(status==='approved'?'approving':'rejecting'),'error');
    return;
  }
  // Confirm step
  const action=status==='approved'?'Approve':'Reject';
  const confirmed=await showConfirm(`${action} this audit?`,`Remarks: "${remarks}"

This action cannot be undone.`,action);
  if(!confirmed)return;
  showLoader('Saving…');
  const data={status,paymentAmount:parseInt(document.getElementById('rPayAmt').value)||a.paymentAmount,adminComments:remarks,reviewedAt:new Date().toISOString().split('T')[0],paymentStatus:status==='approved'?'processing':'rejected'};
  try{await fsUpdate('audits',auditId,data);Object.assign(a,data);const ss=status==='approved'?'completed':'rejected';await fsUpdate('stores',a.storeId,{status:ss});s.status=ss;toast('Audit '+status);closeModal();renderAudits();}
  catch(e){toast('Error: '+e.message,'error');}
  hideLoader();
};

/* ━━━━━━━━━━━ PAYMENTS — Weekly View (Freelancer + Admin) ━━━━━━━━━━━ */
function renderPayments(){
  if(currentUser.role==='team'){renderFreelancerPayments();return;}
  let audits=DB.audits;
  if(currentUser.role==='manager'){const pids=getAccessibleProjects().map(p=>p.id);audits=audits.filter(a=>pids.includes(a.projectId));}
  const totalAmt=audits.reduce((s,a)=>s+(a.paymentAmount||0),0);
  const paidAmt=audits.filter(a=>a.paymentStatus==='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
  const pendAmt=totalAmt-paidAmt;
  const canApprove=currentUser.role==='admin'||currentUser.role==='manager';
  const statsHtml=`<div class="stats-row" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-label"><i class="ti ti-cash"></i>Total Payable</div><div class="stat-value">${moneyFmt(totalAmt)}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--green-text)"><i class="ti ti-circle-check"></i>Paid</div><div class="stat-value" style="color:var(--green)">${moneyFmt(paidAmt)}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--amber-text)"><i class="ti ti-clock"></i>Pending</div><div class="stat-value" style="color:var(--amber)">${moneyFmt(pendAmt)}</div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-receipt"></i>Total Audits</div><div class="stat-value">${audits.length}</div></div>
  </div>`;
  function getWeekNum(dateStr){if(!dateStr)return 0;const d=new Date(dateStr+'T00:00:00');return Math.ceil(d.getDate()/7);}
  function getMonth(dateStr){if(!dateStr)return'—';const d=new Date(dateStr+'T00:00:00');return d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});}
  const groups={};
  audits.forEach(a=>{const month=getMonth(a.submittedAt);const week='Week '+getWeekNum(a.submittedAt);const key=month+'||'+week;if(!groups[key])groups[key]={month,week,audits:[]};groups[key].audits.push(a);});
  const sortedKeys=Object.keys(groups).sort((a,b)=>{const[mA,wA]=a.split('||'),[mB,wB]=b.split('||');return mA===mB?wA.localeCompare(wB):mA.localeCompare(mB);});
  const approveAllBtn=canApprove&&audits.filter(a=>a.paymentStatus==='processing').length?`<button class="btn btn-success" onclick="markAllPaid()"><i class="ti ti-check"></i> Approve All Pending</button>`:'';
  const payPortalBtn=canApprove?`<button class="btn btn-primary-sm" onclick="navigate('payouts')"><i class="ti ti-credit-card-pay"></i> Payout Portal</button>`:'';
  document.getElementById('pageActions').innerHTML=approveAllBtn+payPortalBtn;
  if(!sortedKeys.length){document.getElementById('pageBody').innerHTML=statsHtml+`<div class="empty"><i class="ti ti-cash-off"></i><h3>No payments yet</h3></div>`;return;}
  let weeksHtml='',currentMonth='';
  sortedKeys.forEach(key=>{
    const g=groups[key];
    if(g.month!==currentMonth){if(currentMonth)weeksHtml+='</div>';weeksHtml+=`<div style="margin-bottom:20px"><div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">${g.month}</div><div class="week-grid">`;currentMonth=g.month;}
    const wTotal=g.audits.reduce((s,a)=>s+(a.paymentAmount||0),0);
    const wPaid=g.audits.filter(a=>a.paymentStatus==='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
    const wPend=g.audits.filter(a=>a.paymentStatus!=='paid'&&a.status!=='rejected');
    const wPct=wTotal?Math.round((wPaid/wTotal)*100):0;
    let rows='';
    g.audits.forEach(a=>{
      const s=storeBy(a.storeId),m=userBy(a.teamMemberId);
      const utrChip=a.transactionId?`<span style="font-size:10px;color:var(--text3);font-family:monospace;display:block;margin-top:2px">${a.razorpayPayoutId?'RPX:'+a.razorpayPayoutId.slice(-8):'UTR:'+a.transactionId}</span>`:'';
      rows+=`<tr><td style="font-size:12px"><strong>${s?.name||'—'}</strong><br><span style="color:var(--text2)">${m?.name||'—'}</span></td><td>${badge(a.auditType||a.status)}</td><td>${moneyFmt(a.paymentAmount)}</td><td>${badge(a.paymentStatus)}${utrChip}</td><td>${canApprove&&a.paymentStatus!=='paid'&&a.status!=='rejected'?`<button class="btn btn-sm btn-success" onclick="showQuickPay('${a.id}')"><i class="ti ti-cash"></i> Pay</button>`:''}</td></tr>`;
    });
    const wPendIds=wPend.map(a=>`'${a.id}'`).join(',');
    weeksHtml+=`<div class="week-card"><div class="week-card-head"><h4><i class="ti ti-calendar"></i> ${g.week}</h4><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-weight:700;color:var(--accent)">${wPct}% paid</span>${canApprove&&wPend.length?`<button class="btn btn-sm" style="font-size:11px;padding:4px 8px;" onclick="showBulkWeekPay([${wPendIds}])"><i class="ti ti-credit-card-pay"></i> Pay Week</button>`:''}</div></div><div class="week-card-body"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px"><span style="color:var(--green-text)">Paid: ${moneyFmt(wPaid)}</span><span style="color:var(--amber-text)">Pending: ${moneyFmt(wTotal-wPaid)}</span></div><div class="progress" style="margin-bottom:10px"><div class="progress-fill ${wPct>=100?'green':''}" style="width:${wPct}%"></div></div><div class="table-wrap"><table style="min-width:300px"><thead><tr><th>Store / Team</th><th>Type</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
  });
  if(currentMonth)weeksHtml+='</div></div>';
  document.getElementById('pageBody').innerHTML=statsHtml+weeksHtml;
}

/* ━━━━━━━━━━━ FREELANCER PAYMENTS PAGE ━━━━━━━━━━━ */
function renderFreelancerPayments(){

  const paidAudits=myAudits.filter(a=>a.paymentStatus==='paid');
  const pendingAudits=myAudits.filter(a=>a.paymentStatus!=='paid'&&a.status!=='rejected');
  const processingAudits=myAudits.filter(a=>a.paymentStatus==='processing');

        <div style="width:44px;height:44px;border-radius:12px;background:${hasPayInfo?'rgba(74,222,128,0.15)':'rgba(251,191,36,0.15)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="ti ${hasPayInfo?'ti-wallet':'ti-alert-circle'}" style="font-size:22px;color:${hasPayInfo?'var(--green)':'var(--amber)'}"></i>

          </div>
        </div>

      <button class="btn ${hasPayInfo?'':'btn-primary-sm'}" onclick="showEditPaymentProfile()" style="flex-shrink:0;">

    </div>

  </div>`;

  // ── Stats Row ──
  const statsHtml=`<div class="stats-row" style="margin-bottom:18px;">

      <div style="font-size:13.5px;font-weight:700;color:var(--text);">${processingAudits.length} payment${processingAudits.length>1?'s':''} being processed</div>

    </div>
  </div>`:'';

  const projEarnings={};
  myAudits.forEach(a=>{const p=DB.projects.find(x=>x.id==a.projectId);const pName=p?.name||'General';if(!projEarnings[pName])projEarnings[pName]={total:0,paid:0,pending:0,count:0};projEarnings[pName].total+=(a.paymentAmount||0);projEarnings[pName].count++;if(a.paymentStatus==='paid')projEarnings[pName].paid+=(a.paymentAmount||0);else if(a.status!=='rejected')projEarnings[pName].pending+=(a.paymentAmount||0);});

    <td>${badge(a.status)}</td>

  const pendingSection=pendingAudits.length?`<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title"><i class="ti ti-clock" style="font-size:15px;vertical-align:-2px;margin-right:5px;color:var(--amber)"></i>Pending Payouts <span style="font-size:12px;font-weight:500;color:var(--text2);">(${pendingAudits.length} audits · ${moneyFmt(totalPending)})</span></div></div><div class="table-wrap"><table><thead><tr><th>Store / Project</th><th>Amount</th><th>Audit Status</th><th>Payment Status</th></tr></thead><tbody>${pendRows}</tbody></table></div><div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.08);font-size:12.5px;color:var(--text2);"><i class="ti ti-info-circle" style="font-size:14px;vertical-align:-2px;"></i> Payments are released by admin after audit approval. Make sure your UPI/bank details are updated above.</div></div>`:'';

  document.getElementById('pageBody').innerHTML=setupBanner+statsHtml+processingAlert+pendingSection+projBreakdown+txHistory+(myAudits.length===0?`<div class="empty"><i class="ti ti-cash-off"></i><h3>No earnings yet</h3><p>Complete your first audit to see payments here.</p></div>`:'');
}

window.showMyPaymentHistory=function(filter){
  const myAudits=DB.audits.filter(a=>a.teamMemberId==currentUser.id);
  const list=filter==='paid'?myAudits.filter(a=>a.paymentStatus==='paid'):myAudits.filter(a=>a.paymentStatus!=='paid'&&a.status!=='rejected');
  if(!list.length){toast('No records found','info');return;}
  const title=filter==='paid'?`All Received Payments (${list.length})`:`All Pending Payouts (${list.length})`;
  const sorted=[...list].sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));
  const rows=sorted.map(a=>{const s=storeBy(a.storeId),p=DB.projects.find(x=>x.id==a.projectId);return`<tr><td style="font-size:12px"><strong>${s?.name||'—'}</strong><br><span style="color:var(--text2)">${p?.name||'—'}</span></td><td>${moneyFmt(a.paymentAmount)}</td><td>${badge(a.paymentStatus)}</td><td style="font-size:11.5px;color:var(--text2)">${a.paidAt||a.submittedAt||'—'}</td><td style="font-family:monospace;font-size:11px;color:var(--text3)">${a.transactionId||'—'}</td></tr>`;}).join('');
  openModal(title,`<div class="table-wrap"><table style="min-width:360px"><thead><tr><th>Store</th><th>Amount</th><th>Status</th><th>Date</th><th>UTR</th></tr></thead><tbody>${rows}</tbody></table></div>`);
};

      <button class="btn btn-success" onclick="showManualUTR('${auditId}')" style="padding:12px;flex-direction:column;gap:4px;"><i class="ti ti-receipt" style="font-size:20px"></i><span style="font-size:12px">Manual UTR</span></button>
    </div>
    <div id="payStatusMsg"></div>`);
};

/* ━━━━━━━━━━━ RAZORPAYX PAYOUT ━━━━━━━━━━━ */
window.triggerRazorpayXPayout=async function(auditId, mode){
  const a=DB.audits.find(x=>x.id==auditId);if(!a)return;
  const m=userBy(a.teamMemberId);if(!m){toast('Freelancer not found','error');return;}
  const msgDiv=document.getElementById('payMsgArea_'+auditId);
  if(msgDiv)msgDiv.innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:12px;background:var(--surface2);border-radius:var(--radius);font-size:13px;"><i class="ti ti-loader-2" style="font-size:18px;"></i> Initiating RazorpayX ${mode} payout…</div>`;
  try{
    const res=await fetch(PAYOUT_API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        keyId:RAZORPAYX_KEY_ID,
        keySecret:RAZORPAYX_KEY_SECRET,
        mode, // 'UPI' or 'NEFT' or 'IMPS'
        amount:a.paymentAmount,
        currency:'INR',
        fundAccountDetails:{
          name:m.name,
          phone:m.phone||'',
          email:m.email||'',
          upiId:m.upiId||'',
          bankAccount:m.bankAccount||'',
          ifsc:m.ifsc||''
        },
        narration:'QCheckPro Audit Payout - '+storeBy(a.storeId)?.name,
        referenceId:'QCHK'+Date.now()+auditId.slice(-4)
      })
    });
    const data=await res.json();
    if(data.success){
      const txId=data.utr||data.payout_id||data.referenceId||('RPX'+Date.now());
      await fsUpdate('audits',auditId,{paymentStatus:'paid',transactionId:txId,razorpayPayoutId:data.payout_id||txId,paidAt:new Date().toISOString().split('T')[0],paidBy:currentUser.name,paymentMode:mode});
      a.paymentStatus='paid';a.transactionId=txId;
      if(msgDiv)msgDiv.innerHTML=`<div style="padding:12px;background:var(--green-bg);border-radius:var(--radius);font-size:13px;color:var(--green-text);">✅ Payout successful! UTR: <strong>${txId}</strong></div>`;
      toast('Payout sent via RazorpayX!','success');
      setTimeout(()=>{closeModal();renderPayoutPortal();},1500);
    }else{
      throw new Error(data.message||data.error||'Payout failed');
    }
  }catch(e){
    if(msgDiv)msgDiv.innerHTML=`<div style="padding:12px;background:var(--red-bg);border-radius:var(--radius);font-size:13px;color:var(--red-text);">❌ ${e.message}</div>`;
    toast('Payout failed: '+e.message,'error');
  }
};

window.triggerUPIPayout=function(auditId){
  const a=DB.audits.find(x=>x.id==auditId);if(!a)return;
  const m=userBy(a.teamMemberId);if(!m||!m.upiId){toast('No UPI ID for this freelancer','warning');return;}
  const upiUrl=`upi://pay?pa=${encodeURIComponent(m.upiId)}&pn=${encodeURIComponent(m.name)}&am=${a.paymentAmount}&cu=INR&tn=${encodeURIComponent('QCheckPro Audit Payment')}`;
  window.open(upiUrl,'_blank');
  // Mark as processing and ask for UTR
  openModal('Confirm UPI Payment',`
    <div style="background:var(--surface2);border-radius:var(--radius);padding:12px;margin-bottom:14px;font-size:13px;">
      <div style="font-weight:700;margin-bottom:4px;">${m.name}</div>
      <div style="color:var(--text2);">UPI: <strong>${m.upiId}</strong></div>
      <div style="font-size:20px;font-weight:800;color:var(--amber);margin-top:8px;">₹${Number(a.paymentAmount).toLocaleString('en-IN')}</div>
    </div>
    <div class="form-field"><label>UTR / Transaction ID *</label><input id="upiUtrInput" placeholder="UTR123456789012" style="font-family:monospace;"></div>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary-sm" style="flex:1;" onclick="confirmUPIPayment('${auditId}')"><i class="ti ti-check"></i> Mark as Paid</button>
    </div>`);
};

window.confirmUPIPayment=async function(auditId){
  const utr=document.getElementById('upiUtrInput').value.trim();
  if(!utr){toast('Enter UTR / Transaction ID','error');return;}
  showLoader('Saving…');
  try{
    await fsUpdate('audits',auditId,{paymentStatus:'paid',transactionId:utr,paidAt:new Date().toISOString().split('T')[0],paidBy:currentUser.name,paymentMode:'UPI'});
    const a=DB.audits.find(x=>x.id==auditId);if(a){a.paymentStatus='paid';a.transactionId=utr;}
    await sendPaymentEmail([DB.audits.find(x=>x.id==auditId)],userBy(DB.audits.find(x=>x.id==auditId)?.teamMemberId)?.id);
    toast('Payment recorded!','success');
    closeModal();renderPayoutPortal();
  }catch(e){toast('Error: '+e.message,'error');}
  hideLoader();
};



</script>
