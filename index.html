<script>
// Inline manifest injection — works even if manifest.json file is missing
(function(){
  const m={
    name:"QCheckPro \u2014 Field Audit Manager",
    short_name:"QCheckPro",
    description:"Retail field audit management for SE Core Business Solutions",
    start_url:"/",display:"standalone",orientation:"portrait",
    background_color:"#0f1117",theme_color:"#6c63ff",scope:"/",lang:"en",
    icons:[
      {src:"https://project-j38z4.vercel.app/icons/icon-192.png",sizes:"192x192",type:"image/png",purpose:"any"},
      {src:"https://project-j38z4.vercel.app/icons/icon-512.png",sizes:"512x512",type:"image/png",purpose:"any"},
      {src:"https://project-j38z4.vercel.app/icons/icon-192.png",sizes:"192x192",type:"image/png",purpose:"maskable"},
      {src:"https://project-j38z4.vercel.app/icons/icon-512.png",sizes:"512x512",type:"image/png",purpose:"maskable"}
    ],
    screenshots:[{src:"https://project-j38z4.vercel.app/icons/screenshot1.png",sizes:"1080x1920",type:"image/png",form_factor:"narrow"}],
    categories:["business","productivity"]
  };
  const blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  const url=URL.createObjectURL(blob);
  let el=document.querySelector('link[rel="manifest"]');
  if(!el){el=document.createElement('link');el.rel='manifest';document.head.appendChild(el);}
  el.href=url;
})();
// Inline Service Worker via blob
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    const swCode=`
const CACHE='qcheckpro-v3';
const ASSETS=['/'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(fetch(e.request).then(res=>{const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;}).catch(()=>caches.match(e.request).then(r=>r||caches.match('/'))));});
    `;
    const blob=new Blob([swCode],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url,{scope:'/'}).catch(()=>{
      // fallback: try file-based sw.js
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    });
  });
}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
:root{
  /* ── Layout (never overridden by theme) ── */
  --sidebar-w:240px;
  --header-h:56px;
  --radius:10px;
  --radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,0.18);
  --shadow-md:0 8px 32px rgba(0,0,0,0.28);
  --razorpay:#1A54B9;

  /* ── Default theme: clean dark (overridden by Firestore theme doc) ── */
  --body-bg:#0f1117;
  --surface:rgba(255,255,255,0.08);
  --surface2:rgba(255,255,255,0.05);
  --surface3:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.12);
  --border-md:rgba(255,255,255,0.20);
  --text:#f1f5f9;
  --text2:rgba(241,245,249,0.65);
  --text3:rgba(241,245,249,0.38);
  --accent:#3b82f6;
  --accent2:#2563eb;
  --accent-bg:rgba(59,130,246,0.15);
  --accent-text:#93c5fd;
  --green:#22c55e;
  --green-bg:rgba(34,197,94,0.12);
  --green-text:#86efac;
  --amber:#f59e0b;
  --amber-bg:rgba(245,158,11,0.12);
  --amber-text:#fde68a;
  --red:#ef4444;
  --red-bg:rgba(239,68,68,0.12);
  --red-text:#fca5a5;
  /* sidebar & header bg */
  --sidebar-bg:rgba(15,17,23,0.95);
  --header-bg:rgba(15,17,23,0.9);
  --card-bg:rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;background:#0f1117;}
#globalLoader,#authWrap,#appWrap{position:relative;z-index:1;}
button{font-family:'Inter',sans-serif;cursor:pointer;}
input,select,textarea{font-family:'Inter',sans-serif;font-size:14px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

/* ── AUTH ── */
#authWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.25);border-radius:24px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,0.4);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);transition:.15s;outline:none;font-size:14px;}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;transition:.15s;}
.btn-primary:hover{background:var(--accent2);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:16px;}

/* ── APP SHELL ── */
#appWrap{display:none;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:transform .25s ease;overflow-y:auto;}
.sidebar-logo{padding:16px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sidebar-nav{flex:1;padding:8px;}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:14px 8px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13.5px;font-weight:500;transition:.12s;margin-bottom:1px;border:none;background:transparent;width:100%;text-align:left;}
.nav-item i{font-size:17px;width:20px;flex-shrink:0;color:var(--text3);}
.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff;}
.nav-item.active{background:rgba(96,165,250,0.2);color:#93c5fd;font-weight:600;border:1px solid rgba(96,165,250,0.25);}
.nav-item.active i{color:var(--accent);}
.sidebar-user{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;}
.user-chip{display:flex;align-items:center;gap:9px;}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:var(--text);}
.user-role{font-size:11px;color:var(--text2);}
.logout-btn{margin-left:auto;width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;cursor:pointer;flex-shrink:0;}
.logout-btn:hover{background:var(--red-bg);color:var(--red);border-color:transparent;}

/* Mobile */
.mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--header-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);align-items:center;padding:0 16px;gap:12px;z-index:300;}
.hamburger{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:19px;color:var(--text);}
.mobile-title{font-weight:700;font-size:15px;flex:1;color:var(--text);}
.mobile-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;cursor:pointer;border:none;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:190;}
.overlay.open{display:block;}
.main{margin-left:var(--sidebar-w);min-height:100vh;animation:fadeIn .2s ease;}
.page-header{padding:22px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.page-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.4px;}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px;}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.page-body{padding:18px 24px 60px;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:.15s;}
.stat-card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.3);transform:translateY(-3px);border-color:rgba(255,255,255,0.32);}
.stat-label{font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.04em;}
.stat-value{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;color:var(--text);}
.stat-sub{font-size:11.5px;color:var(--text3);margin-top:5px;}

/* ── CARD/TABLE ── */
.card{background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px;}
.card-header{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:14px;font-weight:700;color:var(--text);}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:480px;}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:.05em;text-transform:uppercase;background:rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.1);}
td{padding:12px 14px;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,0.08);vertical-align:middle;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.06);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700;}
.badge-green{background:var(--green-bg);color:var(--green-text);}
.badge-amber{background:var(--amber-bg);color:var(--amber-text);}
.badge-red{background:var(--red-bg);color:var(--red-text);}
.badge-blue{background:var(--accent-bg);color:var(--accent-text);}
.badge-gray{background:var(--surface2);color:var(--text2);}
.badge-purple{background:rgba(139,92,246,0.2);color:#c4b5fd;}
.badge-teal{background:rgba(20,184,166,0.2);color:#5eead4;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,0.22);background:rgba(255,255,255,0.1);color:var(--text);cursor:pointer;transition:.12s;white-space:nowrap;backdrop-filter:blur(8px);}
.btn:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.35);}
.btn-primary-sm{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(99,102,241,0.4);}
.btn-primary-sm:hover{background:linear-gradient(135deg,#2563eb,#4f46e5);}
.btn-danger{background:rgba(248,113,113,0.15);color:#fca5a5;border-color:rgba(248,113,113,0.3);}
.btn-danger:hover{background:rgba(248,113,113,0.25);}
.btn-success{background:rgba(74,222,128,0.15);color:#86efac;border-color:rgba(74,222,128,0.3);}
.btn-success:hover{background:rgba(74,222,128,0.25);}
.btn-razorpayx{background:linear-gradient(135deg,#1A54B9,#0f3d8c);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(26,84,185,0.4);}
.btn-razorpayx:hover{background:linear-gradient(135deg,#0f3d8c,#0a2d6e);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ── FORM ── */
.form-field{margin-bottom:13px;}
.form-field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:9px 12px;border:1.5px solid rgba(255,255,255,0.18);border-radius:var(--radius);background:rgba(255,255,255,0.08);color:var(--text);outline:none;transition:.15s;font-size:14px;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:rgba(96,165,250,0.6);box-shadow:0 0 0 3px rgba(96,165,250,0.15);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}

/* ── MODAL ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:16px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--sidebar-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;overflow-x:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.5);}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(20px);z-index:1;}
.modal-head h3{font-size:15px;font-weight:700;}
.modal-close{width:30px;height:30px;border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;font-size:17px;color:var(--text2);transition:.1s;}
.modal-close:hover{background:var(--red-bg);color:var(--red);}
.modal-body{padding:18px;}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.14);border-radius:12px;padding:4px;width:fit-content;flex-wrap:wrap;margin-bottom:16px;}
.tab-btn{padding:6px 14px;border-radius:7px;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:.12px;}
.tab-btn.active{background:rgba(255,255,255,0.18);color:#93c5fd;box-shadow:0 2px 12px rgba(0,0,0,0.2);}

/* ── PHOTO BOX ── */
.photo-box{border:1.5px dashed var(--border-md);border-radius:var(--radius);padding:14px;background:var(--surface2);}
.photo-box label.photo-label{display:block;font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.photo-btn-row{display:flex;gap:8px;}
.photo-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:.12s;}
.photo-btn:hover{border-color:var(--accent);color:var(--accent);}
.photo-preview-img{width:100%;max-height:160px;object-fit:cover;border-radius:7px;margin-bottom:8px;display:none;border:1px solid var(--border);}

/* ── SEARCH ── */
.search-wrap{display:flex;align-items:center;gap:8px;border:1.5px solid rgba(255,255,255,0.18);border-radius:var(--radius);padding:8px 12px;background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);transition:.15s;}
.search-wrap:focus-within{border-color:var(--accent);}
.search-wrap i{color:var(--text3);font-size:16px;}
.search-wrap input{border:none;outline:none;background:transparent;color:var(--text);font-size:13.5px;width:100%;}

/* ── PROGRESS ── */
.progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:.4s;}
.progress-fill.green{background:var(--green);}
.progress-fill.amber{background:var(--amber);}
.progress-fill.red{background:var(--red);}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast-item{display:flex;align-items:center;gap:9px;padding:11px 16px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:fadeIn .2s ease;pointer-events:auto;border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(14px);}
.toast-success{background:rgba(15,12,41,0.85);color:#86efac;border-color:rgba(74,222,128,0.35);}
.toast-error{background:rgba(15,12,41,0.85);color:#fca5a5;border-color:rgba(248,113,113,0.35);}
.toast-info{background:rgba(15,12,41,0.85);color:#93c5fd;border-color:rgba(96,165,250,0.35);}
.toast-warning{background:rgba(15,12,41,0.85);color:#fde68a;border-color:rgba(251,191,36,0.35);}

/* ── EMPTY ── */
.empty{text-align:center;padding:56px 20px;}
.empty i{font-size:44px;color:var(--text3);margin-bottom:14px;display:block;}
.empty h3{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty p{font-size:13.5px;color:var(--text2);}

/* ── WEEK CARDS ── */
.week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:20px;}
.week-card{background:rgba(255,255,255,0.09);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-lg);overflow:hidden;}
.week-card-head{padding:12px 16px;background:var(--accent-bg);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.week-card-head h4{font-size:13px;font-weight:700;color:var(--accent);}
.week-card-body{padding:12px 16px;}

/* ── PAYMENT PORTAL SPECIFIC ── */
.payment-info-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;}
.payment-info-box .pi-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.payment-info-box .pi-value{font-size:13.5px;font-weight:600;color:var(--text);font-family:monospace;}
.payout-card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;transition:.15s;}
.payout-card:hover{border-color:rgba(255,255,255,0.28);background:rgba(255,255,255,0.11);}
.payout-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.payout-card-name{font-size:14px;font-weight:700;color:var(--text);}
.payout-card-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.payout-amount{font-size:20px;font-weight:800;color:var(--amber);letter-spacing:-0.5px;}
.payout-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.pay-detail-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2);font-family:monospace;}
.pay-detail-chip i{font-size:13px;color:var(--accent);}

/* ── PROFILE EDIT ── */
.profile-section{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;}
.profile-section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:7px;}

/* ── PROFILE DROPDOWN ── */
#profileDropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--sidebar-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 16px 48px rgba(0,0,0,0.4);z-index:9997;width:240px;overflow:hidden;animation:fadeIn .15s ease;}
#profileDropdown.open{display:block;}
.profile-drop-header{padding:14px 16px;background:var(--accent-bg);border-bottom:1px solid var(--border);}
.profile-drop-avatar{width:42px;height:42px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;margin-bottom:10px;}
.profile-drop-name{font-size:14px;font-weight:700;color:var(--text);}
.profile-drop-role{font-size:12px;color:var(--text2);margin-top:2px;}
.profile-drop-email{font-size:11.5px;color:var(--text3);margin-top:2px;word-break:break-all;}
.profile-drop-body{padding:8px;}
.profile-drop-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;color:var(--text2);}
.profile-drop-row i{font-size:16px;width:18px;flex-shrink:0;}
.profile-drop-divider{height:1px;background:var(--border);margin:6px 0;}
.profile-drop-logout{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;font-weight:600;color:var(--red-text);cursor:pointer;border:none;background:none;width:100%;transition:.12s;font-family:'Inter',sans-serif;}
.profile-drop-logout:hover{background:var(--red-bg);}
.profile-drop-editpay{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;font-weight:600;color:var(--accent-text);cursor:pointer;border:none;background:none;width:100%;transition:.12s;font-family:'Inter',sans-serif;}
.profile-drop-editpay:hover{background:var(--accent-bg);}

/* ── LOADER ── */
#globalLoader{position:fixed;inset:0;background:rgba(15,12,41,0.75);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(12px);}
#globalLoader .spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
#globalLoader p{color:var(--text2);font-size:13.5px;font-weight:500;}

/* ── CASHFREE STATUS ── */
.rzp-processing{background:rgba(7,38,84,0.3);border:1px solid rgba(13,71,161,0.5);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#93c5fd;display:flex;align-items:center;gap:8px;margin-top:8px;}
.rzp-processing i{animation:pulse 1.5s ease infinite;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-md);}
  .main{margin-left:0;padding-top:var(--header-h);}
  .mobile-header{display:flex;}
  .page-header{padding:14px 14px 0;}
  .page-body{padding:14px 14px 80px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .stat-value{font-size:20px;}
  .modal-backdrop{padding:0;align-items:flex-end;}
  .modal{border-radius:var(--radius-lg) var(--radius-lg) 0 0;max-height:92vh;}
  .form-row{grid-template-columns:1fr;}
  .page-actions{width:100%;}
  .page-actions .btn{font-size:12px;padding:7px 10px;}
  table{min-width:340px;}
  .week-grid{grid-template-columns:1fr;}
  .payout-card-top{flex-direction:column;}
}
@media(max-width:380px){.stats-row{grid-template-columns:1fr;}}

/* ── Photo Lightbox ── */
#photoLightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99999;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
#photoLightbox img{max-width:100%;max-height:90vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.8);object-fit:contain;}

#photoLightbox .lb-label{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;padding:5px 16px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}

// Send email for single audit — groups all paid audits of same freelancer+project and sends one combined email
async function sendPaymentEmail(auditId){
  if(!EMAILJS_PUBLIC_KEY||EMAILJS_PUBLIC_KEY==='YOUR_PUBLIC_KEY')return;
  const a=DB.audits.find(x=>x.id==auditId);if(!a)return;
  const m=userBy(a.teamMemberId);if(!m?.email)return;
  // Group all paid audits for same freelancer + same project
  const projAudits=DB.audits.filter(x=>x.teamMemberId==a.teamMemberId&&x.projectId==a.projectId&&x.paymentStatus==='paid');
  await sendProjectPaymentEmail(a.teamMemberId, a.projectId, projAudits);
}

// Core function — sends one combined email per project for a freelancer
async function sendProjectPaymentEmail(memberId, projectId, audits){
  if(!EMAILJS_PUBLIC_KEY||EMAILJS_PUBLIC_KEY==='YOUR_PUBLIC_KEY')return;
  if(!audits||!audits.length)return;
  const m=userBy(memberId);if(!m?.email)return;
  const ccAddr=EMAILJS_CC_EMAIL&&EMAILJS_CC_EMAIL.trim()?EMAILJS_CC_EMAIL.trim():'';
  const p=DB.projects.find(x=>x.id==projectId);
  const totalAmt=audits.reduce((s,a)=>s+(a.paymentAmount||0),0);
  // Build store-wise list
  const storeLines=audits.map((a,i)=>{
    const s=storeBy(a.storeId);
    return`${i+1}. Store: ${s?.name||'—'} | Amount: Rs.${a.paymentAmount} | UTR: ${a.transactionId||'N/A'} | Date: ${a.paidAt||'—'}`;
  }).join('\n');
  const utr=audits.length===1?(audits[0].transactionId||'N/A'):'Multiple (see details)';
  const mode=audits[0]?.paymentMode||'UPI';
  try{
    emailjs.init(EMAILJS_PUBLIC_KEY);
    await emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{
      to_name:     m.name,
      to_email:    m.email,
      cc_email:    ccAddr,
      project:     p?.name||'SE CORE',
      amount:      'Rs.'+totalAmt,
      store_count: audits.length+' store'+(audits.length>1?'s':''),
      store_lines: storeLines,
      utr:         utr,
      pay_date:    audits[0]?.paidAt||'today',
      pay_mode:    mode,
      from_name:   'SE CORE Business Solutions'
    });
    toast('Email sent to '+m.name+' ✉️','success');
  }catch(e){
    console.warn('Email failed:',e);
    toast('Email failed: '+(e?.text||e?.message||'check EmailJS config'),'error');
  }
}

// Called after bulk pay — sends one email per freelancer per project
async function sendBulkPaymentEmails(auditIds){
  if(!EMAILJS_PUBLIC_KEY||EMAILJS_PUBLIC_KEY==='YOUR_PUBLIC_KEY')return;
  // Group by freelancer + project
  const groups={};
  auditIds.forEach(id=>{
    const a=DB.audits.find(x=>x.id==id);if(!a)return;
    const key=a.teamMemberId+'_'+a.projectId;
    if(!groups[key])groups[key]={memberId:a.teamMemberId,projectId:a.projectId,audits:[]};
    groups[key].audits.push(a);
  });
  for(const g of Object.values(groups)){
    await sendProjectPaymentEmail(g.memberId,g.projectId,g.audits);
  }
}

/* ━━━━━━━━━━━ THEME (Firestore-driven) ━━━━━━━━━━━ */
/*
  To change the app theme, update this Firestore doc:
  Collection: settings  |  Document: theme

  Fields (all optional — only set what you want to change):
    body_bg       : e.g. "#0f1117"  or  "#ffffff"
    accent        : primary color   e.g. "#3b82f6"
    accent2       : darker primary  e.g. "#2563eb"
    accent_bg     : tinted bg       e.g. "rgba(59,130,246,0.15)"
    accent_text   : light tint text e.g. "#93c5fd"
    text          : main text color e.g. "#f1f5f9"
    text2         : secondary text  e.g. "rgba(241,245,249,0.65)"
    text3         : muted text      e.g. "rgba(241,245,249,0.38)"
    surface       : card/glass bg   e.g. "rgba(255,255,255,0.08)"
    surface2      : deeper glass    e.g. "rgba(255,255,255,0.05)"
    border        : border color    e.g. "rgba(255,255,255,0.12)"
    sidebar_bg    : sidebar color   e.g. "rgba(15,17,23,0.95)"
    header_bg     : header color    e.g. "rgba(15,17,23,0.9)"
    card_bg       : card color      e.g. "rgba(255,255,255,0.06)"

  Example light theme doc:
    body_bg: "#f8fafc"
    accent: "#2563eb"
    accent2: "#1d4ed8"
    accent_bg: "rgba(37,99,235,0.1)"
    accent_text: "#1d4ed8"
    text: "#0f172a"
    text2: "rgba(15,23,42,0.65)"
    text3: "rgba(15,23,42,0.38)"
    surface: "rgba(0,0,0,0.04)"
    surface2: "rgba(0,0,0,0.02)"
    border: "rgba(0,0,0,0.1)"
    sidebar_bg: "#1e293b"
    header_bg: "rgba(30,41,59,0.95)"
    card_bg: "rgba(0,0,0,0.03)"
*/
async function loadTheme(){
  if(!db)return;
  try{
    const snap=await db.collection('settings').doc('theme').get();
    if(!snap.exists)return;
    const t=snap.data();
    const R=document.documentElement;
    const set=(k,v)=>{if(v)R.style.setProperty(k,v);};
    set('--body-bg',   t.body_bg);
    set('--accent',    t.accent);
    set('--accent2',   t.accent2);
    set('--accent-bg', t.accent_bg);
    set('--accent-text',t.accent_text);
    set('--text',      t.text);
    set('--text2',     t.text2);
    set('--text3',     t.text3);
    set('--surface',   t.surface);
    set('--surface2',  t.surface2);
    set('--surface3',  t.surface3);
    set('--border',    t.border);
    set('--border-md', t.border_md);
    set('--sidebar-bg',t.sidebar_bg);
    set('--header-bg', t.header_bg);
    set('--card-bg',   t.card_bg);
    set('--green',     t.green);
    set('--green-bg',  t.green_bg);
    set('--green-text',t.green_text);
    set('--amber',     t.amber);
    set('--amber-bg',  t.amber_bg);
    set('--amber-text',t.amber_text);
    set('--red',       t.red);
    set('--red-bg',    t.red_bg);
    set('--red-text',  t.red_text);
    // Apply body background
    document.body.style.background=t.body_bg||'';
  }catch(e){
    console.warn('Theme load failed (using default):',e.message);
  }
}

async function fsDelete(col,id){await db.collection(col).doc(id).delete();}

function _haversine(la1,lo1,la2,lo2){const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
async function _geocodeCity(city){if(!city)return null;const k=city.toLowerCase().trim();if(_geoCache[k])return _geoCache[k];try{const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city+', India')}&format=json&limit=1`,{headers:{'Accept-Language':'en'}});const d=await r.json();if(d&&d[0]){const c={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};_geoCache[k]=c;return c;}}catch(_){}return null;}
window.gpsDetect=async function(){if(!navigator.geolocation){toast('GPS not supported','error');return;}_gpsStatus='loading';renderStoresTeam();navigator.geolocation.getCurrentPosition(async pos=>{_uLat=pos.coords.latitude;_uLng=pos.coords.longitude;_gpsStatus='ok';const cities=[...new Set(DB.stores.filter(s=>s.selfAssign&&!s.assignedTo&&(!parseFloat(s.lat)||!parseFloat(s.lng))&&s.city).map(s=>s.city.toLowerCase().trim()))];if(cities.length)await Promise.all(cities.map(c=>_geocodeCity(c)));renderStoresTeam();},()=>{_gpsStatus='error';renderStoresTeam();toast('Location denied','error');});};

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
function badge(status){const m={active:'blue',planning:'gray',approved:'green',submitted:'amber',rejected:'red',completed:'green',paid:'green',pending:'amber',processing:'blue','in-progress':'blue',open:'green',closed:'red',mystery:'purple',announced:'blue',posm:'amber',initiated:'teal',queued:'teal'};const labels={mystery:'Mystery',announced:'Announced',posm:'POSM','in-progress':'In Progress',initiated:'Initiated',queued:'Queued'};const display=labels[status?.toLowerCase()]||(status?status.charAt(0).toUpperCase()+status.slice(1):'—');return`<span class="badge badge-${m[status?.toLowerCase()]||'gray'}">${display}</span>`;}
function moneyFmt(n){return'₹'+Number(n||0).toLocaleString('en-IN');}
function initials(name){return(name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();}
function userBy(id){return DB.users.find(u=>u.id==id);}
function storeBy(id){return DB.stores.find(s=>s.id==id);}
function auditForStore(sid){return DB.audits.find(a=>a.storeId==sid);}
function getAccessibleProjects(){if(!currentUser)return[];if(currentUser.role==='admin')return DB.projects;if(currentUser.role==='manager')return DB.projects.filter(p=>p.managerId==currentUser.id);return[];}
window.setProjectFilter=function(v){selectedProject=v;navigate(currentPage);}

/* ━━━━━━━━━━━ PHOTO UPLOAD ━━━━━━━━━━━ */
function compressPhoto(file,maxWidth=1280,quality=0.82){return new Promise((resolve,reject)=>{if(!file){resolve(null);return;}if(!file.type.startsWith('image/')){toast('Only images allowed','error');resolve(null);return;}const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(url);let w=img.width,h=img.height;if(w>maxWidth){h=Math.round(h*(maxWidth/w));w=maxWidth;}const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);canvas.toBlob(blob=>{if(!blob){reject(new Error('Compress failed'));return;}resolve(blob);},'image/jpeg',quality);};img.onerror=()=>reject(new Error('Image load failed'));img.src=url;});}
async function uploadPhoto(file,path){if(!file)return null;try{const blob=await compressPhoto(file);if(!blob)return null;const ref=storage.ref(path);await ref.put(blob,{contentType:'image/jpeg'});return await ref.getDownloadURL();}catch(e){toast('Photo upload failed: '+e.message,'error');return null;}}

/* ━━━━━━━━━━━ MONTHLY VIEW ━━━━━━━━━━━ */
function renderMonthly(){
  let audits=DB.audits;
  if(currentUser.role==='manager'){const pids=getAccessibleProjects().map(p=>p.id);audits=audits.filter(a=>pids.includes(a.projectId));}
  document.getElementById('pageActions').innerHTML=`<button class="btn btn-primary-sm" onclick="exportAuditsSheet()"><i class="ti ti-table-export"></i> Export</button>`;

  // Group by year-month
  const groups={};
  audits.forEach(a=>{
    const d=a.submittedAt||a.createdAt||'';
    const key=d?d.slice(0,7):'unknown';
    if(!groups[key])groups[key]={key,label:key==='unknown'?'No Date':new Date(key+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'}),audits:[]};
    groups[key].audits.push(a);
  });
  const sortedKeys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  if(!sortedKeys.length){
    document.getElementById('pageBody').innerHTML=`<div class="empty"><i class="ti ti-calendar-off"></i><h3>No audit data yet</h3></div>`;
    return;
  }

  // Summary stats
  const totalAmt=audits.reduce((s,a)=>s+(a.paymentAmount||0),0);
  const paidAmt=audits.filter(a=>a.paymentStatus==='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
  const statsHtml=`<div class="stats-row" style="margin-bottom:18px;">
    <div class="stat-card"><div class="stat-label"><i class="ti ti-calendar-stats"></i>Total Months</div><div class="stat-value">${sortedKeys.filter(k=>k!=='unknown').length}</div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-clipboard-check"></i>Total Audits</div><div class="stat-value">${audits.length}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--green-text)"><i class="ti ti-circle-check"></i>Total Paid</div><div class="stat-value" style="color:var(--green)">${moneyFmt(paidAmt)}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--amber-text)"><i class="ti ti-clock"></i>Pending</div><div class="stat-value" style="color:var(--amber)">${moneyFmt(totalAmt-paidAmt)}</div></div>
  </div>`;

  let html=statsHtml;
  sortedKeys.forEach(key=>{
    const g=groups[key];
    const mTotal=g.audits.reduce((s,a)=>s+(a.paymentAmount||0),0);
    const mPaid=g.audits.filter(a=>a.paymentStatus==='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
    const mApproved=g.audits.filter(a=>a.status==='approved').length;
    const mSubmitted=g.audits.filter(a=>a.status==='submitted').length;
    const mPct=mTotal?Math.round((mPaid/mTotal)*100):0;

    // Group by project within month
    const byProject={};
    g.audits.forEach(a=>{
      const p=DB.projects.find(x=>x.id==a.projectId);
      const pName=p?.name||'General';
      if(!byProject[pName])byProject[pName]={name:pName,count:0,total:0,paid:0,approved:0};
      byProject[pName].count++;
      byProject[pName].total+=(a.paymentAmount||0);
      if(a.paymentStatus==='paid')byProject[pName].paid+=(a.paymentAmount||0);
      if(a.status==='approved')byProject[pName].approved++;
    });

    const projRows=Object.values(byProject).map(p=>`
      <tr>
        <td><strong>${p.name}</strong></td>
        <td style="text-align:center">${p.count}</td>
        <td style="text-align:center">${p.approved}</td>
        <td style="font-weight:700">${moneyFmt(p.total)}</td>
        <td style="color:var(--green-text);font-weight:600">${moneyFmt(p.paid)}</td>
        <td style="color:var(--amber-text);font-weight:600">${moneyFmt(p.total-p.paid)}</td>
      </tr>`).join('');

    // Freelancer breakdown
    const byMember={};
    g.audits.forEach(a=>{
      const m=userBy(a.teamMemberId);const mName=m?.name||'Unknown';
      if(!byMember[mName])byMember[mName]={name:mName,count:0,total:0,paid:0};
      byMember[mName].count++;byMember[mName].total+=(a.paymentAmount||0);
      if(a.paymentStatus==='paid')byMember[mName].paid+=(a.paymentAmount||0);
    });
    const memberRows=Object.values(byMember).sort((a,b)=>b.total-a.total).map(m=>`
      <tr>
        <td>${m.name}</td>
        <td style="text-align:center">${m.count}</td>
        <td style="font-weight:700">${moneyFmt(m.total)}</td>
        <td style="color:var(--green-text);font-weight:600">${moneyFmt(m.paid)}</td>
        <td><div style="display:flex;align-items:center;gap:8px;"><div class="progress" style="width:70px;flex-shrink:0"><div class="progress-fill" style="width:${m.total?Math.round((m.paid/m.total)*100):0}%;background:var(--green)"></div></div><span style="font-size:11.5px;font-weight:700;color:var(--text2)">${m.total?Math.round((m.paid/m.total)*100):0}%</span></div></td>
      </tr>`).join('');

    html+=`<div class="card" style="margin-bottom:18px;">
      <div class="card-header">
        <div>
          <div class="card-title" style="font-size:16px;"><i class="ti ti-calendar-month" style="color:var(--accent);margin-right:6px;"></i>${g.label}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px;">${g.audits.length} audits · ${mApproved} approved · ${mSubmitted} pending review</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:18px;font-weight:800;color:var(--text);">${moneyFmt(mTotal)}</div>
          <div style="font-size:12px;color:var(--green-text);margin-top:2px;">${moneyFmt(mPaid)} paid (${mPct}%)</div>
        </div>
      </div>
      <div style="padding:14px 18px;border-bottom:1px solid var(--border);">
        <div class="progress" style="margin-bottom:0;height:8px;"><div class="progress-fill ${mPct>=100?'green':mPct>50?'':'amber'}" style="width:${mPct}%;background:${mPct>=100?'var(--green)':mPct>50?'var(--accent)':'var(--amber)'}"></div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;">
        <div style="padding:14px 18px;border-right:1px solid var(--border);">
          <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">By Project</div>
          <div class="table-wrap"><table style="min-width:300px"><thead><tr><th>Project</th><th style="text-align:center">Audits</th><th style="text-align:center">Approved</th><th>Total</th><th>Paid</th><th>Pending</th></tr></thead><tbody>${projRows}</tbody></table></div>
        </div>
        <div style="padding:14px 18px;">
          <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">By Freelancer</div>
          <div class="table-wrap"><table style="min-width:260px"><thead><tr><th>Name</th><th style="text-align:center">Audits</th><th>Total</th><th>Paid</th><th>Progress</th></tr></thead><tbody>${memberRows}</tbody></table></div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('pageBody').innerHTML=html;
}

/* ━━━━━━━━━━━ REPORTS ━━━━━━━━━━━ */
function renderReports(){
  let audits=DB.audits,stores=DB.stores;
  if(currentUser.role==='manager'){const pids=getAccessibleProjects().map(p=>p.id);audits=audits.filter(a=>pids.includes(a.projectId));stores=stores.filter(s=>pids.includes(s.projectId));}
  document.getElementById('pageActions').innerHTML=`<button class="btn btn-primary-sm" onclick="exportMasterSheet()"><i class="ti ti-table-export"></i> Export All</button>`;

  const totalStores=stores.length;
  const auditedStores=new Set(audits.map(a=>a.storeId)).size;
  const approvedAudits=audits.filter(a=>a.status==='approved');
  const rejectedAudits=audits.filter(a=>a.status==='rejected');
  const pendingAudits=audits.filter(a=>a.status==='submitted');
  const totalPaid=audits.filter(a=>a.paymentStatus==='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
  const totalPending=audits.filter(a=>a.paymentStatus!=='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
  const completionRate=totalStores?Math.round((approvedAudits.length/totalStores)*100):0;

  const statsHtml=`<div class="stats-row" style="margin-bottom:20px;">
    <div class="stat-card"><div class="stat-label"><i class="ti ti-building-store"></i>Total Stores</div><div class="stat-value">${totalStores}</div><div class="stat-sub">${auditedStores} audited</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--green-text)"><i class="ti ti-circle-check"></i>Approved</div><div class="stat-value" style="color:var(--green)">${approvedAudits.length}</div><div class="stat-sub">${completionRate}% completion</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--amber-text)"><i class="ti ti-clock"></i>Pending Review</div><div class="stat-value" style="color:var(--amber)">${pendingAudits.length}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--red-text)"><i class="ti ti-circle-x"></i>Rejected</div><div class="stat-value" style="color:var(--red)">${rejectedAudits.length}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--green-text)"><i class="ti ti-cash"></i>Total Paid</div><div class="stat-value" style="color:var(--green)">${moneyFmt(totalPaid)}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--amber-text)"><i class="ti ti-hourglass"></i>Pay Pending</div><div class="stat-value" style="color:var(--amber)">${moneyFmt(totalPending)}</div></div>
  </div>`;

  // Completion progress bar
  const progressHtml=`<div class="card" style="margin-bottom:16px;padding:18px 20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="font-size:14px;font-weight:700;">Overall Completion</div>
      <div style="font-size:22px;font-weight:800;color:${completionRate>=75?'var(--green)':completionRate>=40?'var(--accent)':'var(--amber)'};">${completionRate}%</div>
    </div>
    <div class="progress" style="height:10px;"><div class="progress-fill" style="width:${completionRate}%;background:${completionRate>=75?'var(--green)':completionRate>=40?'var(--accent)':'var(--amber)'};"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text2);">
      <span>${approvedAudits.length} approved of ${totalStores} stores</span>
      <span>${totalStores-approvedAudits.length} remaining</span>
    </div>
  </div>`;

  // Project-wise report
  const projects=getAccessibleProjects();
  const projRows=projects.map(p=>{
    const pS=stores.filter(s=>s.projectId==p.id);
    const pA=audits.filter(a=>a.projectId==p.id);
    const pApproved=pA.filter(a=>a.status==='approved').length;
    const pPending=pA.filter(a=>a.status==='submitted').length;
    const pRejected=pA.filter(a=>a.status==='rejected').length;
    const pPaid=pA.filter(a=>a.paymentStatus==='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
    const pPendAmt=pA.filter(a=>a.paymentStatus!=='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
    const pct=pS.length?Math.round((pApproved/pS.length)*100):0;
    return`<tr>
      <td><strong>${p.name}</strong><br><span style="font-family:monospace;font-size:11px;color:var(--text2)">${p.code}</span></td>
      <td style="text-align:center">${pS.length}</td>
      <td style="text-align:center;color:var(--green-text);font-weight:700">${pApproved}</td>
      <td style="text-align:center;color:var(--amber-text)">${pPending}</td>
      <td style="text-align:center;color:var(--red-text)">${pRejected}</td>
      <td style="color:var(--green-text);font-weight:600">${moneyFmt(pPaid)}</td>
      <td style="color:var(--amber-text);font-weight:600">${moneyFmt(pPendAmt)}</td>
      <td><div style="display:flex;align-items:center;gap:7px;"><div class="progress" style="width:80px;flex-shrink:0"><div class="progress-fill" style="width:${pct}%;background:${pct>=75?'var(--green)':pct>=40?'var(--accent)':'var(--amber)'}"></div></div><span style="font-size:11.5px;font-weight:700">${pct}%</span></div></td>
      <td>${badge(p.status)}</td>
    </tr>`;
  }).join('');

  const projectReport=projects.length?`<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title"><i class="ti ti-folder" style="color:var(--accent);margin-right:5px;font-size:15px;vertical-align:-2px;"></i>Project-wise Report</div></div><div class="table-wrap"><table><thead><tr><th>Project</th><th style="text-align:center">Stores</th><th style="text-align:center">Approved</th><th style="text-align:center">Pending</th><th style="text-align:center">Rejected</th><th>Paid</th><th>Pay Pending</th><th>Progress</th><th>Status</th></tr></thead><tbody>${projRows}</tbody></table></div></div>`:'';

  // Store status report
  const storeStatusGroups={open:0,closed:0,completed:0,other:0};
  stores.forEach(s=>{const st=(s.status||'').toLowerCase();if(st==='open')storeStatusGroups.open++;else if(st==='closed')storeStatusGroups.closed++;else if(st==='completed')storeStatusGroups.completed++;else storeStatusGroups.other++;});
  const storeStatusHtml=`<div class="card" style="margin-bottom:16px;padding:18px 20px;">
    <div class="card-title" style="margin-bottom:14px;"><i class="ti ti-building-store" style="color:var(--accent);margin-right:6px;font-size:15px;vertical-align:-2px;"></i>Store Status Breakdown</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;">
      <div style="background:var(--green-bg);border-radius:var(--radius);padding:12px;text-align:center;"><div style="font-size:24px;font-weight:800;color:var(--green)">${storeStatusGroups.completed}</div><div style="font-size:12px;color:var(--green-text);font-weight:600">Completed</div></div>
      <div style="background:var(--accent-bg);border-radius:var(--radius);padding:12px;text-align:center;"><div style="font-size:24px;font-weight:800;color:var(--accent)">${storeStatusGroups.open}</div><div style="font-size:12px;color:var(--accent-text);font-weight:600">Open</div></div>
      <div style="background:var(--red-bg);border-radius:var(--radius);padding:12px;text-align:center;"><div style="font-size:24px;font-weight:800;color:var(--red)">${storeStatusGroups.closed}</div><div style="font-size:12px;color:var(--red-text);font-weight:600">Closed</div></div>
      <div style="background:var(--surface2);border-radius:var(--radius);padding:12px;text-align:center;"><div style="font-size:24px;font-weight:800;color:var(--text2)">${storeStatusGroups.other}</div><div style="font-size:12px;color:var(--text2);font-weight:600">Other</div></div>
    </div>
  </div>`;

  // Audit type breakdown
  const typeGroups={};
  audits.forEach(a=>{const t=a.auditType||'unknown';if(!typeGroups[t])typeGroups[t]=0;typeGroups[t]++;});
  const typeRows=Object.entries(typeGroups).sort((a,b)=>b[1]-a[1]).map(([t,c])=>`<tr><td>${badge(t)}</td><td style="font-weight:700;font-size:15px">${c}</td><td>${Math.round((c/audits.length)*100)}%</td></tr>`).join('');
  const typeReport=Object.keys(typeGroups).length?`<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title"><i class="ti ti-chart-pie" style="color:var(--accent);margin-right:5px;font-size:15px;vertical-align:-2px;"></i>Audit Type Breakdown</div></div><div class="table-wrap"><table><thead><tr><th>Type</th><th>Count</th><th>Share</th></tr></thead><tbody>${typeRows}</tbody></table></div></div>`:'';

  document.getElementById('pageBody').innerHTML=statsHtml+progressHtml+projectReport+storeStatusHtml+typeReport;
}

/* ━━━━━━━━━━━ ANALYTICS ━━━━━━━━━━━ */
function renderAnalytics(){
  let audits=DB.audits,stores=DB.stores;
  if(currentUser.role==='manager'){const pids=getAccessibleProjects().map(p=>p.id);audits=audits.filter(a=>pids.includes(a.projectId));stores=stores.filter(s=>pids.includes(s.projectId));}
  document.getElementById('pageActions').innerHTML='';

  // Monthly trend
  const monthlyData={};
  audits.forEach(a=>{
    const d=a.submittedAt||'';
    if(!d)return;
    const key=d.slice(0,7);
    if(!monthlyData[key])monthlyData[key]={label:new Date(key+'-01').toLocaleDateString('en-IN',{month:'short',year:'numeric'}),count:0,paid:0,pending:0,rejected:0};
    monthlyData[key].count++;
    if(a.paymentStatus==='paid')monthlyData[key].paid+=(a.paymentAmount||0);
    else monthlyData[key].pending+=(a.paymentAmount||0);
    if(a.status==='rejected')monthlyData[key].rejected++;
  });
  const months=Object.keys(monthlyData).sort();

  // Top performing freelancers
  const freelancerStats={};
  audits.forEach(a=>{
    const m=userBy(a.teamMemberId);if(!m)return;
    const id=m.id;
    if(!freelancerStats[id])freelancerStats[id]={name:m.name,total:0,approved:0,rejected:0,earned:0,paid:0};
    freelancerStats[id].total++;
    freelancerStats[id].earned+=(a.paymentAmount||0);
    if(a.status==='approved')freelancerStats[id].approved++;
    if(a.status==='rejected')freelancerStats[id].rejected++;
    if(a.paymentStatus==='paid')freelancerStats[id].paid+=(a.paymentAmount||0);
  });
  const topFreelancers=Object.values(freelancerStats).sort((a,b)=>b.approved-a.approved).slice(0,10);

  // City breakdown
  const cityStats={};
  stores.forEach(s=>{const c=s.city||'Unknown';if(!cityStats[c])cityStats[c]={city:c,stores:0,audited:0};cityStats[c].stores++;});
  audits.filter(a=>a.status==='approved').forEach(a=>{const s=storeBy(a.storeId);if(!s)return;const c=s.city||'Unknown';if(cityStats[c])cityStats[c].audited++;});
  const topCities=Object.values(cityStats).sort((a,b)=>b.stores-a.stores).slice(0,10);

  // Payment method breakdown
  const payMethods={};
  audits.filter(a=>a.paymentStatus==='paid').forEach(a=>{const m=a.paymentMode||'Unknown';if(!payMethods[m])payMethods[m]=0;payMethods[m]++;});

  const totalAudits=audits.length;
  const approvedCount=audits.filter(a=>a.status==='approved').length;
  const rejectedCount=audits.filter(a=>a.status==='rejected').length;
  const approvalRate=totalAudits?Math.round((approvedCount/totalAudits)*100):0;
  const rejectionRate=totalAudits?Math.round((rejectedCount/totalAudits)*100):0;

  // KPI cards
  const kpiHtml=`<div class="stats-row" style="margin-bottom:20px;">
    <div class="stat-card"><div class="stat-label"><i class="ti ti-trending-up"></i>Approval Rate</div><div class="stat-value" style="color:var(--green)">${approvalRate}%</div><div class="stat-sub">${approvedCount} of ${totalAudits}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--red-text)"><i class="ti ti-trending-down"></i>Rejection Rate</div><div class="stat-value" style="color:var(--red)">${rejectionRate}%</div><div class="stat-sub">${rejectedCount} rejected</div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-users"></i>Active Freelancers</div><div class="stat-value">${Object.keys(freelancerStats).length}</div><div class="stat-sub">with audits</div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-map-pin"></i>Cities Covered</div><div class="stat-value">${Object.keys(cityStats).length}</div><div class="stat-sub">across region</div></div>
  </div>`;

  // Monthly trend table
  const trendRows=months.slice().reverse().map(k=>{const d=monthlyData[k];return`<tr>
    <td style="font-weight:700">${d.label}</td>
    <td style="text-align:center">${d.count}</td>
    <td style="color:var(--green-text);font-weight:600">${moneyFmt(d.paid)}</td>
    <td style="color:var(--amber-text);font-weight:600">${moneyFmt(d.pending)}</td>
    <td style="text-align:center;color:var(--red-text)">${d.rejected}</td>
  </tr>`;}).join('');
  const trendCard=months.length?`<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title"><i class="ti ti-chart-line" style="color:var(--accent);margin-right:5px;font-size:15px;vertical-align:-2px;"></i>Monthly Trend</div></div><div class="table-wrap"><table><thead><tr><th>Month</th><th style="text-align:center">Audits</th><th>Paid Out</th><th>Pending Pay</th><th style="text-align:center">Rejected</th></tr></thead><tbody>${trendRows}</tbody></table></div></div>`:'';

  // Top freelancers
  const flRows=topFreelancers.map(f=>{const rate=f.total?Math.round((f.approved/f.total)*100):0;return`<tr>
    <td><strong>${f.name}</strong></td>
    <td style="text-align:center">${f.total}</td>
    <td style="text-align:center;color:var(--green-text);font-weight:700">${f.approved}</td>
    <td style="text-align:center;color:var(--red-text)">${f.rejected}</td>
    <td style="font-weight:700">${moneyFmt(f.earned)}</td>
    <td style="color:var(--green-text);font-weight:600">${moneyFmt(f.paid)}</td>
    <td><div style="display:flex;align-items:center;gap:7px;"><div class="progress" style="width:70px;flex-shrink:0"><div class="progress-fill" style="width:${rate}%;background:${rate>=75?'var(--green)':rate>50?'var(--accent)':'var(--amber)'}"></div></div><span style="font-size:11.5px;font-weight:700">${rate}%</span></div></td>
  </tr>`;}).join('');
  const flCard=topFreelancers.length?`<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title"><i class="ti ti-award" style="color:var(--amber);margin-right:5px;font-size:15px;vertical-align:-2px;"></i>Top Freelancers</div></div><div class="table-wrap"><table><thead><tr><th>Name</th><th style="text-align:center">Total</th><th style="text-align:center">Approved</th><th style="text-align:center">Rejected</th><th>Earned</th><th>Paid</th><th>Rate</th></tr></thead><tbody>${flRows}</tbody></table></div></div>`:'';

  // City coverage
  const cityRows=topCities.map(c=>{const pct=c.stores?Math.round((c.audited/c.stores)*100):0;return`<tr>
    <td><strong>${c.city}</strong></td>
    <td style="text-align:center">${c.stores}</td>
    <td style="text-align:center;color:var(--green-text);font-weight:700">${c.audited}</td>
    <td><div style="display:flex;align-items:center;gap:7px;"><div class="progress" style="width:80px;flex-shrink:0"><div class="progress-fill" style="width:${pct}%;background:${pct>=75?'var(--green)':pct>=40?'var(--accent)':'var(--amber)'}"></div></div><span style="font-size:11.5px;font-weight:700">${pct}%</span></div></td>
  </tr>`;}).join('');
  const cityCard=topCities.length?`<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title"><i class="ti ti-map" style="color:var(--accent);margin-right:5px;font-size:15px;vertical-align:-2px;"></i>City Coverage</div></div><div class="table-wrap"><table><thead><tr><th>City</th><th style="text-align:center">Stores</th><th style="text-align:center">Audited</th><th>Coverage</th></tr></thead><tbody>${cityRows}</tbody></table></div></div>`:'';

  // Payment methods
  const pmRows=Object.entries(payMethods).map(([m,c])=>`<tr><td><span class="badge badge-blue">${m}</span></td><td style="font-weight:700">${c}</td><td>${audits.filter(a=>a.paymentStatus==='paid').length?Math.round((c/audits.filter(a=>a.paymentStatus==='paid').length)*100):0}%</td></tr>`).join('');
  const pmCard=Object.keys(payMethods).length?`<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title"><i class="ti ti-credit-card" style="color:var(--accent);margin-right:5px;font-size:15px;vertical-align:-2px;"></i>Payment Methods Used</div></div><div class="table-wrap"><table><thead><tr><th>Method</th><th>Count</th><th>Share</th></tr></thead><tbody>${pmRows}</tbody></table></div></div>`:'';

  document.getElementById('pageBody').innerHTML=kpiHtml+trendCard+flCard+cityCard+pmCard+(totalAudits===0?`<div class="empty"><i class="ti ti-chart-off"></i><h3>No data to analyze yet</h3><p>Start submitting audits to see analytics.</p></div>`:'');
}

/* ━━━━━━━━━━━ APPROVALS ━━━━━━━━━━━ */
function renderApprovals(){
  if(currentUser.role!=='admin'){
    document.getElementById('pageBody').innerHTML=`<div class="empty"><i class="ti ti-lock"></i><h3>Admin Only</h3><p>Only admins can access approvals.</p></div>`;
    return;
  }
  const pending=DB.users.filter(u=>u.status==='pending_approval');
  const approved=DB.users.filter(u=>u.role==='team'&&u.status!=='pending_approval');

  document.getElementById('pageActions').innerHTML=pending.length?`<span style="background:var(--amber-bg);color:var(--amber-text);font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;border:1px solid var(--amber);">${pending.length} Pending</span>`:'';

  const pendingCards=pending.length?pending.map(u=>`
    <div class="card" style="margin-bottom:12px;">
      <div style="padding:16px 18px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;">
        <div class="user-avatar" style="width:44px;height:44px;font-size:15px;font-weight:800;flex-shrink:0;">${initials(u.name)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:700;margin-bottom:2px;">${u.name}</div>

          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12.5px;color:var(--text2);">
            <span><i class="ti ti-phone" style="font-size:12px"></i> ${u.phone||'—'}</span>
            <span><i class="ti ti-map-pin" style="font-size:12px"></i> ${u.city||'—'}</span>
            <span><i class="ti ti-calendar" style="font-size:12px"></i> Signed up: ${u.signupAt||'—'}</span>
          </div>
          ${(u.aadhaarUrl||u.chequeUrl)?`<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
            ${u.aadhaarUrl?`<button class="btn btn-sm" onclick="openLightbox('${u.aadhaarUrl}','Aadhaar — ${u.name}')"><i class="ti ti-id-badge"></i> Aadhaar</button>`:''}
            ${u.chequeUrl?`<button class="btn btn-sm" onclick="openLightbox('${u.chequeUrl}','Cheque — ${u.name}')"><i class="ti ti-credit-card"></i> Cheque</button>`:''}
          </div>`:'<div style="margin-top:8px;font-size:12px;color:var(--text3);"><i class="ti ti-file-off"></i> No KYC documents uploaded</div>'}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
          <button class="btn btn-success" onclick="approveUser('${u.id}','${u.name}')"><i class="ti ti-user-check"></i> Approve</button>
          <button class="btn btn-danger" onclick="rejectUser('${u.id}','${u.name}')"><i class="ti ti-user-x"></i> Reject</button>
        </div>
      </div>
    </div>`).join(''):
  `<div class="card" style="margin-bottom:16px;"><div class="empty" style="padding:28px;"><i class="ti ti-inbox"></i><h3>No Pending Approvals</h3><p>All freelancer registrations have been processed.</p></div></div>`;

  // Recently approved freelancers list
  const approvedRows=approved.slice(0,20).map(u=>`<tr>
    <td><div style="display:flex;align-items:center;gap:9px;"><div class="user-avatar" style="width:30px;height:30px;font-size:11px;">${initials(u.name)}</div><div><strong style="font-size:13px">${u.name}</strong><br><span style="font-size:11px;color:var(--text2)">${u.email}</span></div></div></td>
    <td style="font-size:12.5px">${u.phone||'—'}</td>
    <td style="font-size:12.5px">${u.city||'—'}</td>
    <td>${badge(u.status||'active')}</td>
    <td style="font-size:12px;color:var(--text2)">${u.signupAt||'—'}</td>
    <td><button class="btn btn-sm btn-danger" onclick="suspendUser('${u.id}','${u.name}')"><i class="ti ti-ban"></i> Suspend</button></td>
  </tr>`).join('');
  const approvedCard=approved.length?`<div class="card"><div class="card-header"><div class="card-title"><i class="ti ti-users-group" style="color:var(--green);margin-right:6px;font-size:15px;vertical-align:-2px;"></i>Approved Freelancers (${approved.length})</div></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Phone</th><th>City</th><th>Status</th><th>Joined</th><th></th></tr></thead><tbody>${approvedRows}</tbody></table></div></div>`:'';

  document.getElementById('pageBody').innerHTML=
    `<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Pending Approval (${pending.length})</div>`+
    pendingCards+
    (approved.length?`<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:20px;">Approved Freelancers</div>`:'')+
    approvedCard;
}

window.approveUser=async function(userId,name){
  const confirmed=await showConfirm('Approve '+name+'?','This will give them access to log in and submit audits.','Approve');
  if(!confirmed)return;
  showLoader('Approving…');
  try{
    await fsUpdate('users',userId,{status:'active'});
    const u=DB.users.find(x=>x.id==userId);if(u)u.status='active';
    toast(name+' approved!','success');renderApprovals();
  }catch(e){toast('Error: '+e.message,'error');}
  hideLoader();
};
window.rejectUser=async function(userId,name){
  const confirmed=await showConfirm('Reject '+name+'?','Their account will be marked rejected and they cannot log in.','Reject');
  if(!confirmed)return;
  showLoader('Rejecting…');
  try{
    await fsUpdate('users',userId,{status:'rejected'});
    const u=DB.users.find(x=>x.id==userId);if(u)u.status='rejected';
    toast(name+' rejected','info');renderApprovals();
  }catch(e){toast('Error: '+e.message,'error');}
  hideLoader();
};
window.suspendUser=async function(userId,name){
  const confirmed=await showConfirm('Suspend '+name+'?','They will not be able to log in until re-approved.','Suspend');
  if(!confirmed)return;
  showLoader('Suspending…');
  try{
    await fsUpdate('users',userId,{status:'suspended'});
    const u=DB.users.find(x=>x.id==userId);if(u)u.status='suspended';
    toast(name+' suspended','info');renderApprovals();
  }catch(e){toast('Error: '+e.message,'error');}
  hideLoader();
};

  const active=members.filter(m=>m.status==='active'||!m.status).length;

    const mPending=mAudits.filter(a=>a.paymentStatus!=='paid'&&a.status!=='rejected').reduce((s,a)=>s+(a.paymentAmount||0),0);

      <td style="font-size:12.5px">${m.phone||'—'}</td>
      <td style="font-size:12.5px">${m.city||'—'}</td>
      <td style="text-align:center">${assignedStores}</td>
      <td style="text-align:center">${mAudits.length}</td>
      <td style="text-align:center;color:var(--green-text);font-weight:700">${mApproved}</td>

      <td style="color:var(--amber-text);font-weight:600">${moneyFmt(mPending)}</td>
      <td>

        ${m.bankAccount?`<div style="font-size:11px;color:var(--text2);font-family:monospace;">Ac: ****${m.bankAccount.slice(-4)}</div>`:''}
        ${!m.upiId&&!m.bankAccount?'<span style="font-size:12px;color:var(--text3)">No payment info</span>':''}
      </td>
      <td>${badge(m.status||'active')}</td>

  }).join('');

  document.getElementById('pageBody').innerHTML=statsHtml+`
    <div style="margin-bottom:12px;"><div class="search-wrap" style="max-width:300px;"><i class="ti ti-search"></i><input id="teamSearch" placeholder="Search members…" oninput="filterTeamTable()" /></div></div>

}

/* ━━━━━━━━━━━ PAYOUT PORTAL ━━━━━━━━━━━ */
function renderPayoutPortal(){
  if(currentUser.role==='team'){
    document.getElementById('pageBody').innerHTML=`<div class="empty"><i class="ti ti-lock"></i><h3>Admin / Manager Only</h3><p>Use the Payments page to view your earnings.</p></div>`;
    return;
  }
  let audits=DB.audits;
  if(currentUser.role==='manager'){const pids=getAccessibleProjects().map(p=>p.id);audits=audits.filter(a=>pids.includes(a.projectId));}

  const pendingAudits=audits.filter(a=>a.paymentStatus==='processing'&&a.status==='approved');
  const paidAudits=audits.filter(a=>a.paymentStatus==='paid');
  const totalPending=pendingAudits.reduce((s,a)=>s+(a.paymentAmount||0),0);
  const totalPaid=paidAudits.reduce((s,a)=>s+(a.paymentAmount||0),0);

  document.getElementById('pageActions').innerHTML=pendingAudits.length?`<button class="btn btn-success" onclick="markAllPaid()"><i class="ti ti-check"></i> Mark All Paid</button>`:'';

  const statsHtml=`<div class="stats-row" style="margin-bottom:18px;">
    <div class="stat-card"><div class="stat-label" style="color:var(--amber-text)"><i class="ti ti-clock"></i>Pending Payouts</div><div class="stat-value" style="color:var(--amber)">${moneyFmt(totalPending)}</div><div class="stat-sub">${pendingAudits.length} audits</div></div>
    <div class="stat-card"><div class="stat-label" style="color:var(--green-text)"><i class="ti ti-circle-check"></i>Total Paid Out</div><div class="stat-value" style="color:var(--green)">${moneyFmt(totalPaid)}</div><div class="stat-sub">${paidAudits.length} payments</div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-users"></i>Freelancers Owed</div><div class="stat-value">${new Set(pendingAudits.map(a=>a.teamMemberId)).size}</div><div class="stat-sub">awaiting payout</div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-cash"></i>Total Payable</div><div class="stat-value">${moneyFmt(totalPending+totalPaid)}</div><div class="stat-sub">all time</div></div>
  </div>`;

  // Group pending by freelancer
  const byFreelancer={};
  pendingAudits.forEach(a=>{
    const m=userBy(a.teamMemberId);if(!m)return;
    const id=m.id;
    if(!byFreelancer[id])byFreelancer[id]={member:m,audits:[],total:0};
    byFreelancer[id].audits.push(a);
    byFreelancer[id].total+=(a.paymentAmount||0);
  });

  let pendingHtml='';
  if(Object.keys(byFreelancer).length){
    Object.values(byFreelancer).sort((a,b)=>b.total-a.total).forEach(({member:m,audits:mAudits,total})=>{
      const hasUpi=!!m.upiId, hasBank=!!(m.bankAccount&&m.ifsc);
      const payBtns=hasUpi?`<button class="btn btn-sm btn-success" onclick="openUPIForFreelancer('${m.id}','UPI')" style="margin-right:6px;"><i class="ti ti-qrcode"></i> UPI</button>`:'';
      const auditRows=mAudits.map(a=>{const s=storeBy(a.storeId),p=DB.projects.find(x=>x.id==a.projectId);return`<tr>
        <td style="font-size:12.5px"><strong>${s?.name||'—'}</strong><br><span style="color:var(--text2)">${p?.name||'—'} · ${a.submittedAt||'—'}</span></td>
        <td style="font-weight:700;color:var(--amber)">${moneyFmt(a.paymentAmount)}</td>
        <td>${badge(a.auditType||'')}</td>
        <td style="white-space:nowrap;">
          <button class="btn btn-sm btn-success" onclick="showQuickPay('${a.id}')"><i class="ti ti-cash"></i> Pay</button>
        </td>
      </tr>`;}).join('');

      pendingHtml+=`<div class="card" style="margin-bottom:14px;">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="user-avatar" style="width:38px;height:38px;font-size:13px;">${initials(m.name)}</div>
            <div>
              <div style="font-size:14px;font-weight:700;">${m.name}</div>
              <div style="font-size:12px;color:var(--text2);">${m.phone||m.email||'—'}${m.upiId?` · <i class="ti ti-qrcode" style="font-size:11px"></i> ${m.upiId}`:''}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div style="text-align:right;"><div style="font-size:18px;font-weight:800;color:var(--amber);">${moneyFmt(total)}</div><div style="font-size:11.5px;color:var(--text2)">${mAudits.length} audit${mAudits.length>1?'s':''} pending</div></div>
            ${payBtns}
            ${!hasUpi&&!hasBank?`<span style="font-size:12px;color:var(--amber-text);"><i class="ti ti-alert-circle"></i> No payment info</span>`:''}
          </div>
        </div>
        <div class="table-wrap"><table style="min-width:320px;"><thead><tr><th>Store / Project</th><th>Amount</th><th>Type</th><th></th></tr></thead><tbody>${auditRows}</tbody></table></div>
        <div id="payMsgArea_${m.id}" style="padding:0 14px 12px;"></div>
      </div>`;
    });
  } else {
    pendingHtml=`<div class="card" style="margin-bottom:16px;"><div class="empty" style="padding:28px;"><i class="ti ti-check-all" style="color:var(--green)"></i><h3 style="color:var(--green)">All Caught Up!</h3><p>No pending payouts right now.</p></div></div>`;
  }

  // Recent paid history
  const recentPaid=[...paidAudits].sort((a,b)=>(b.paidAt||'').localeCompare(a.paidAt||'')).slice(0,15);
  const paidRows=recentPaid.map(a=>{
    const m=userBy(a.teamMemberId),s=storeBy(a.storeId),p=DB.projects.find(x=>x.id==a.projectId);
    return`<tr>
      <td style="font-size:12.5px"><strong>${m?.name||'—'}</strong></td>
      <td style="font-size:12.5px"><strong>${s?.name||'—'}</strong><br><span style="color:var(--text2)">${p?.name||'—'}</span></td>
      <td style="font-weight:700;color:var(--green)">${moneyFmt(a.paymentAmount)}</td>
      <td style="font-size:12px;color:var(--text2)">${a.paidAt||'—'}</td>
      <td>${a.paymentMode?`<span class="badge badge-blue">${a.paymentMode}</span>`:'<span style="color:var(--text3)">—</span>'}</td>
      <td style="font-family:monospace;font-size:11px;color:var(--text3);max-width:130px;overflow:hidden;text-overflow:ellipsis;">${a.transactionId||a.razorpayPayoutId||'—'}</td>
      <td><button class="btn btn-sm" style="padding:3px 8px;font-size:11px;" onclick="navigator.clipboard.writeText('${a.transactionId||a.razorpayPayoutId||""}');toast('Copied!','info')"><i class="ti ti-copy"></i></button></td>
    </tr>`;}).join('');
  const paidCard=recentPaid.length?`<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title"><i class="ti ti-history" style="color:var(--green);margin-right:5px;font-size:15px;vertical-align:-2px;"></i>Recent Payouts (${paidAudits.length} total)</div></div><div class="table-wrap"><table><thead><tr><th>Freelancer</th><th>Store / Project</th><th>Amount</th><th>Paid On</th><th>Mode</th><th>UTR / Ref</th><th></th></tr></thead><tbody>${paidRows}</tbody></table></div></div>`:'';

  document.getElementById('pageBody').innerHTML=statsHtml+
    `<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Pending Payouts</div>`+
    pendingHtml+
    (recentPaid.length?`<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:20px;">Payment History</div>`+paidCard:'');
}

window.markAllPaid=async function(){
  let audits=DB.audits.filter(a=>a.paymentStatus==='processing'&&a.status==='approved');
  if(currentUser.role==='manager'){const pids=getAccessibleProjects().map(p=>p.id);audits=audits.filter(a=>pids.includes(a.projectId));}
  if(!audits.length){toast('No pending payouts','info');return;}
  const confirmed=await showConfirm('Mark All Paid?',`Mark ${audits.length} audits (${moneyFmt(audits.reduce((s,a)=>s+(a.paymentAmount||0),0))}) as paid?\n\nAll will require manual UTR entry.`,'Mark Paid');
  if(!confirmed)return;
  const utr='BULK'+Date.now();
  showLoader('Processing…');
  try{
    for(const a of audits){
      await fsUpdate('audits',a.id,{paymentStatus:'paid',transactionId:utr,paidAt:new Date().toISOString().split('T')[0],paidBy:currentUser.name,paymentMode:'Manual'});
      a.paymentStatus='paid';a.transactionId=utr;
    }
    await sendBulkPaymentEmails(audits.map(a=>a.id));
    toast(audits.length+' payouts marked paid!','success');
    renderPayoutPortal();
  }catch(e){toast('Error: '+e.message,'error');}
  hideLoader();
};

window.showManualUTR=function(auditId){
  openModal('Enter UTR — Manual Pay',`
    <div class="form-field"><label>UTR / Transaction Reference *</label><input id="manualUtrInput" placeholder="UTR123456789012" style="font-family:monospace;font-size:15px;letter-spacing:.05em;"></div>
    <div class="form-field"><label>Payment Mode</label><select id="manualPayMode"><option value="UPI">UPI</option><option value="IMPS">IMPS</option><option value="NEFT">NEFT</option><option value="Cash">Cash</option><option value="Manual">Manual</option></select></div>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" style="flex:1;" onclick="confirmManualUTR('${auditId}')"><i class="ti ti-check"></i> Confirm Payment</button>
    </div>`);
};

window.confirmManualUTR=async function(auditId){
  const utr=document.getElementById('manualUtrInput').value.trim();
  const mode=document.getElementById('manualPayMode').value;
  if(!utr){toast('Enter UTR/reference number','error');return;}
  showLoader('Saving…');
  try{
    await fsUpdate('audits',auditId,{paymentStatus:'paid',transactionId:utr,paidAt:new Date().toISOString().split('T')[0],paidBy:currentUser.name,paymentMode:mode});
    const a=DB.audits.find(x=>x.id==auditId);
    if(a){a.paymentStatus='paid';a.transactionId=utr;a.paymentMode=mode;}
    await sendPaymentEmail(auditId);
    toast('Payment recorded!','success');
    closeModal();renderPayoutPortal();
  }catch(e){toast('Error: '+e.message,'error');}
  hideLoader();
};

/* ━━━━━━━━━━━ NAVIGATE ━━━━━━━━━━━ */
const pageMeta={dashboard:{title:'Dashboard'},projects:{title:'Projects'},stores:{title:'Stores'},audits:{title:'Audits'},payments:{title:'Payments'},monthly:{title:'Monthly View'},reports:{title:'Reports'},analytics:{title:'Analytics'},approvals:{title:'Approvals'},team:{title:'Freelancers'},payouts:{title:'Payout Portal'}};
function navigate(page){
  currentPage=page;
  const meta=pageMeta[page]||{title:page};
  document.getElementById('pageTitle').textContent=meta.title;
  document.getElementById('pageSubtitle').textContent=currentUser?currentUser.name+' · '+currentUser.role.charAt(0).toUpperCase()+currentUser.role.slice(1):'';
  document.getElementById('mobileTitle').textContent=meta.title;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const an=document.querySelector(`.nav-item[data-page="${page}"]`);
  if(an)an.classList.add('active');
  document.getElementById('pageActions').innerHTML='';
  document.getElementById('pageBody').innerHTML='';
  const renders={dashboard:renderDashboard,projects:renderProjects,stores:renderStores,audits:renderAudits,payments:renderPayments,monthly:renderMonthly,reports:renderReports,analytics:renderAnalytics,approvals:renderApprovals,team:renderTeam,payouts:renderPayoutPortal};

  if(renders[page])renders[page]();
}

/* ━━━━━━━━━━━ DASHBOARD ━━━━━━━━━━━ */
function renderDashboard(){
  const role=currentUser.role;
  const allP=DB.projects,allS=DB.stores,allA=DB.audits;

  const myA=role==='team'?fA.filter(a=>a.teamMemberId==currentUser.id):fA;
  const submitted=myA.filter(a=>a.status==='submitted').length;
  const approved=myA.filter(a=>a.status==='approved').length;
  const pendPay=myA.filter(a=>a.paymentStatus!=='paid');
  const pendAmt=pendPay.reduce((s,a)=>s+(a.paymentAmount||0),0);
  const paidAmt=myA.filter(a=>a.paymentStatus==='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);
  let stats=[];

  else{stats.push({icon:'ti-building-store',label:'My Stores',value:myS.length,sub:'assigned to me',key:'my-stores',color:''});}
  stats.push({icon:'ti-clipboard-list',label:'Total Audits',value:myA.length,sub:'all audits',key:'total-audits',color:''});
  stats.push({icon:'ti-loader',label:'Pending Review',value:submitted,sub:'awaiting',key:'pending-review',color:'var(--amber)'});
  stats.push({icon:'ti-circle-check',label:'Approved',value:approved,sub:'cleared',key:'approved',color:'var(--green)'});
  stats.push({icon:'ti-cash',label:'Pay Pending',value:moneyFmt(pendAmt),sub:pendPay.length+' audits',key:'payment-pending',color:'var(--red)'});
  stats.push({icon:'ti-circle-check',label:'Total Paid',value:moneyFmt(paidAmt),sub:'to team',key:'total-paid',color:'var(--green)'});
  let projCards='';
  if(role!=='team'&&allP.length){projCards=`<div style="margin-bottom:20px;"><div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Project Progress</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;">${allP.map(p=>{const pS=allS.filter(s=>s.projectId==p.id);const pA=allA.filter(a=>a.projectId==p.id);const done=pA.filter(a=>a.status==='approved').length;const pct=pS.length?Math.round((done/pS.length)*100):0;const paidTotal=pA.filter(a=>a.paymentStatus==='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);const pendTotal=pA.filter(a=>a.paymentStatus!=='paid').reduce((s,a)=>s+(a.paymentAmount||0),0);const pColor=pct>=75?'green':pct>=40?'':pct>0?'amber':'red';return`<div class="card" style="cursor:pointer;" onclick="setProjectFilter('${p.id}')"><div style="padding:14px 16px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:13px;font-weight:700;">${p.name}</span>${badge(p.status)}</div><div style="font-size:11.5px;color:var(--text2);margin-bottom:6px;">${pct}% complete · ${done}/${pS.length} stores</div><div class="progress"><div class="progress-fill ${pColor}" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;"><span style="color:var(--green-text);">Paid: ${moneyFmt(paidTotal)}</span><span style="color:var(--amber-text);">Pending: ${moneyFmt(pendTotal)}</span></div></div></div>`;}).join('')}</div></div>`;}
  const recent=[...myA].sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||'')).slice(0,8);
  const isFreelancer=role==='team';

  const emptyHtml=!allP.length?`<div class="card"><div class="empty"><i class="ti ti-rocket"></i><h3>Welcome to QCheck Pro!</h3><p>Start by creating a project and adding your team.</p><div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;"><button class="btn btn-primary-sm" onclick="navigate('projects')"><i class="ti ti-folder-plus"></i> Create Project</button><button class="btn" onclick="navigate('team')"><i class="ti ti-user-plus"></i> Add Team</button></div></div></div>`:'';
